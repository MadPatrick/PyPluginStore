    #pypluginstore-container[data-layout="pyplugin"] .pps-card-desc {
        margin-bottom: 14px;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-card-meta {
        margin: 0 0 14px 0;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-actions {
        padding: 0;
    }

    /* Keep the original PyPlugin layout independent from global Domoticz/theme card rules. */
    #pypluginstore-container[data-layout="pyplugin"] .pps-card {
        border-radius: 8px !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-card-header {
        border-radius: 0 !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .filters,
    #pypluginstore-container[data-layout="pyplugin"] #pypluginstore-status {
        border-radius: 8px !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .btn-link,
    #pypluginstore-container[data-layout="pyplugin"] .filters input[type="text"],
    #pypluginstore-container[data-layout="pyplugin"] .sort-controls select {
        border-radius: 6px !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-switch {
        width: 46px !important;
        height: 22px !important;
        padding: 0 !important;
        margin: 0 !important;
        border: 0 !important;
        border-radius: 999px !important;
        background: transparent !important;
        box-shadow: none !important;
        overflow: visible !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-switch input {
        opacity: 0 !important;
        width: 0 !important;
        height: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        border: 0 !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-slider {
        border-radius: 999px !important;
        background: rgba(107, 130, 160, 0.15) !important;
        border: 1px solid rgba(74, 158, 218, 0.28) !important;
        box-shadow: none !important;
        box-sizing: border-box !important;
        overflow: hidden !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-slider:before {
        content: "" !important;
        display: block !important;
        width: 16px !important;
        height: 16px !important;
        left: 2px !important;
        bottom: 2px !important;
        border: 0 !important;
        border-radius: 50% !important;
        background-color: #8ea8c0 !important;
        box-shadow: none !important;
    }

        background: rgba(58, 191, 126, 0.3) !important;
        border-color: #3abf7e !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-switch input:checked + .pps-slider:before {
        transform: translateX(24px) !important;
        background-color: #3abf7e !important;
    }

    #pypluginstore-container .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--pps-border);
    }

    #pypluginstore-container .header-title {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 220px;
    }

    #pypluginstore-container .app-icon {
        width: 44px;
        height: 44px;
        object-fit: contain;
        flex: 0 0 auto;
    }

    #pypluginstore-container h1 {
        margin: 0;
        font-size: 1.4em;
        font-weight: 600;
        color: var(--pps-text-heading);
        letter-spacing: 0.02em;
    }

    #pypluginstore-status {
        font-weight: 500;
        font-size: 0.85em;
        color: var(--pps-text);
        background: var(--pps-panel-bg);
        border: 1px solid var(--pps-border);
        padding: 5px 12px;
        border-radius: var(--pps-radius);
    }

    #pypluginstore-container .header-actions {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
    }

    #pypluginstore-container .filters {
        display: flex;
        gap: 14px;
        margin-bottom: 20px;
        align-items: center;
        background: var(--pps-panel-bg);
        padding: 14px 18px;
        border-radius: var(--pps-radius);
        border: 1px solid var(--pps-border);
        flex-wrap: wrap;
        box-shadow: var(--pps-shadow);
    }

    #pypluginstore-container .filters input[type="text"] {
        flex-grow: 1;
        padding: 8px 14px;
        border: var(--pps-input-border);
        border-radius: 6px;
        font-size: 0.9em;
        min-width: 200px;
        background: var(--pps-input-bg);
        color: var(--pps-input-text);
        outline: none;
        transition: border-color 0.2s;
    }

    #pypluginstore-container .filters input[type="text"]:focus {
        border-color: var(--pps-border-hover);
        box-shadow: 0 0 0 3px var(--pps-focus-ring);
    }

    #pypluginstore-container .filters input[type="text"]::placeholder {
        color: var(--pps-input-placeholder);
    }

    #pypluginstore-container .filters label {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 500;
        font-size: 0.9em;
        cursor: pointer;
        user-select: none;
        color: var(--pps-text);
    }

    #pypluginstore-container .layout-choice {
        white-space: nowrap;
    }

    #pypluginstore-container .sort-controls {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    #pypluginstore-container .sort-controls label {
        margin: 0;
        font-weight: normal;
        font-size: 0.85em;
        color: var(--pps-text-muted);
    }

    #pypluginstore-container .sort-controls select {
        padding: 8px 12px;
        border: var(--pps-input-border);
        border-radius: 6px;
        font-size: 0.88em;
        background: var(--pps-input-bg);
        color: var(--pps-input-text);
        cursor: pointer;
        outline: none;
        transition: border-color 0.2s;
    }

    #pypluginstore-container .sort-controls select:focus {
        border-color: var(--pps-border-hover);
    }

    #pypluginstore-container .pps-switch {
        position: relative;
        display: inline-block;
        width: 46px;
        height: 22px;
    }

    #pypluginstore-container .pps-switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    #pypluginstore-container .pps-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--pps-button-bg);
        transition: .3s;
        border-radius: 22px;
        border: var(--pps-button-border);
    }

    #pypluginstore-container .pps-slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 2px;
        bottom: 2px;
        background-color: var(--pps-text-muted);
        transition: .3s;
        border-radius: 50%;
    }

    #pypluginstore-container .pps-switch input:checked + .pps-slider {
        background-color: rgba(58, 191, 126, 0.3);
        border-color: var(--pps-success);
    }

    #pypluginstore-container .pps-switch input:checked + .pps-slider:before {
        transform: translateX(24px);
        background-color: var(--pps-success);
    }

    #pypluginstore-container .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 16px;
    }

    #pypluginstore-container .pps-card {
        background: var(--pps-card-bg);
        border: var(--pps-card-border);
        border-radius: var(--pps-radius);
        padding: var(--pps-card-padding);
        box-shadow: var(--pps-shadow);
        color: var(--pps-text);
        font-family: var(--pps-card-font-family);
        display: flex;
        flex-direction: column;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    #pypluginstore-container .pps-card:hover {
        border-color: var(--pps-border-hover);
        background: var(--pps-card-bg-hover);
        box-shadow: var(--pps-shadow-hover);
    }

    #pypluginstore-container .pps-card:hover .pps-card-header {
        border-color: var(--pps-card-title-border-hover);
        color: var(--pps-card-title-text-hover);
        background: var(--pps-card-title-bg-hover);
    }

    #pypluginstore-container .pps-card-header {
        font-size: var(--pps-card-title-font-size);
        font-weight: var(--pps-card-title-font-weight);
        margin: var(--pps-card-title-margin);
        min-height: var(--pps-card-title-height);
        padding: var(--pps-card-title-padding);
        color: var(--pps-card-title-text);
        background: var(--pps-card-title-bg);
        border: var(--pps-card-title-border);
        border-radius: var(--pps-card-title-radius);
        font-family: var(--pps-card-title-font-family);
        line-height: var(--pps-card-title-line-height);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 6px;
        box-sizing: border-box;
        overflow: visible;
    }

    #pypluginstore-container[data-layout="theme"] .pps-card-header {
        height: auto !important;
        text-indent: 0 !important;
    }

    #pypluginstore-container .pps-card-header-left {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        min-width: 0;
        flex: 1 1 auto;
    }

    #pypluginstore-container .pps-plugin-title {
        min-width: 0;

            <h1>PyPluginStore: Plugin Store</h1>
        </div>
        <div class="header-actions">
            <button id="refresh-update-status" class="btn-refresh" type="button">Refresh status</button>

                <span class="pps-slider"></span>

    <div id="plugins-list" class="grid">
        <!-- Plugins will be rendered here -->
    </div>

<script>
(function() {
    console.log("PyPluginStore script starting...");
    let payloadIdx = null;
    let triggerIdx = null;
    let isLoading = false;
    let pluginCache = null;
    let installedCache = [];
    let localCache = [];
    let updateStatusCache = {};
    let versionsCache = {};
    let platformCache = {};
    let installedMatchDetailsCache = {};
    let managerKey = null;
    let currentSort = 'name';
    let themeRefreshTimer = null;
    let themeObserver = null;
    const INSTALLED_FILTER_STORAGE_KEY = 'pypluginstore.installedOnly';
    const LAYOUT_STORAGE_KEY = 'pypluginstore.layoutMode';
    const LAYOUT_PYPLUGIN = 'pyplugin';
    const LAYOUT_THEME = 'theme';

    function setStatus(msg) {
        console.log("PyPluginStore Status: " + msg);
        const el = document.getElementById('pypluginstore-status');
        if (el) el.innerText = msg;
    }

    function readStoredInstalledFilter() {
        try {
            return window.localStorage.getItem(INSTALLED_FILTER_STORAGE_KEY) === 'true';
        } catch (e) {
            return false;
        }
    }

    function writeStoredInstalledFilter(checked) {
        try {
            window.localStorage.setItem(INSTALLED_FILTER_STORAGE_KEY, checked ? 'true' : 'false');
        } catch (e) {}
    }

    function readStoredLayoutMode() {
        try {
            const stored = window.localStorage.getItem(LAYOUT_STORAGE_KEY);
            return stored === LAYOUT_THEME ? LAYOUT_THEME : LAYOUT_PYPLUGIN;
        } catch (e) {
            return LAYOUT_PYPLUGIN;
        }
    }

    function writeStoredLayoutMode(mode) {
        try {
            window.localStorage.setItem(LAYOUT_STORAGE_KEY, mode);
        } catch (e) {}
    }

    function setLayoutMode(mode, persist) {
        const layoutMode = mode === LAYOUT_PYPLUGIN ? LAYOUT_PYPLUGIN : LAYOUT_THEME;
        const container = document.getElementById('pypluginstore-container');
        if (container) {
            container.setAttribute('data-layout', layoutMode);
            if (layoutMode === LAYOUT_PYPLUGIN) {
                clearComputedDomoticzThemeVars(container);
                container.setAttribute('data-domoticz-theme-look', 'pyplugin');
                if (themeRefreshTimer) {
                    clearTimeout(themeRefreshTimer);
                    themeRefreshTimer = null;
                }
            }
        }

        const toggle = document.getElementById('layout-toggle');
        if (toggle) {
            toggle.checked = layoutMode === LAYOUT_THEME;
        }

        const label = document.getElementById('layout-toggle-label');
        if (label) {
            label.innerText = layoutMode === LAYOUT_THEME ? 'Theme layout' : 'PyPlugin layout';
        }

        if (persist) {
            writeStoredLayoutMode(layoutMode);
        }

        if (layoutMode === LAYOUT_THEME) {
            applyDomoticzThemeTileLook();
        }
    }

    function clearComputedDomoticzThemeVars(container) {
        if (!container || !container.style) return;
        const properties = [];
        for (let index = 0; index < container.style.length; index++) {
            const propertyName = container.style.item(index);
            if (propertyName.indexOf('--dz-pps-') === 0) {
                properties.push(propertyName);
            }
        }
        properties.forEach(propertyName => container.style.removeProperty(propertyName));
    }

    function setupThemeObserver() {
        if (themeObserver || !document.body || !window.MutationObserver) return;
        themeObserver = new MutationObserver(scheduleDomoticzThemeRefresh);
        themeObserver.observe(document.body, {
            attributes: true,
            attributeFilter: ['class', 'style']
        });
    }

    function scheduleDomoticzThemeRefresh() {
        const container = document.getElementById('pypluginstore-container');
        if (!container || container.getAttribute('data-layout') !== LAYOUT_THEME) return;
        if (readStoredLayoutMode() !== LAYOUT_THEME) return;

        if (themeRefreshTimer) {
            clearTimeout(themeRefreshTimer);
        }
        themeRefreshTimer = setTimeout(function() {
            themeRefreshTimer = null;
            applyDomoticzThemeTileLook();
        }, 80);
    }

    function applyDomoticzThemeTileLook() {
        const container = document.getElementById('pypluginstore-container');
        if (!container || !document.body || !window.getComputedStyle) return;
        if (container.getAttribute('data-layout') === LAYOUT_PYPLUGIN) return;
        clearComputedDomoticzThemeVars(container);

        const probe = document.createElement('div');
        probe.id = 'pypluginstore-theme-probe';
        probe.setAttribute('aria-hidden', 'true');
        probe.style.cssText = [
            'position:absolute',
            'left:-10000px',
            'top:-10000px',
            'width:320px',
            'height:auto',
            'visibility:hidden',
            'pointer-events:none',
            'z-index:-1'
        ].join(';');
        probe.innerHTML = [
            '<div id="pypluginstore-theme-card-sample" class="item itemBlock">',
            '<section>',
            '<table id="itemtablesmall"><tbody><tr>',
            '<td id="name">Domoticz tile</td>',
            '<td id="bigtext">42</td>',
            '<td id="img"></td>',
            '<td id="status">Plugin status</td>',
            '<td id="lastupdate">Theme sample</td>',
            '</tr></tbody></table>',
            '</section>',
            '</div>',
            '<a class="btnstyle3" href="#">Button</a>',
            '<a class="btnstyle3-sel" href="#">Primary</a>',
            '<a class="btnstyle3-dis" href="#">Disabled</a>',
            '<input type="text" class="text ui-widget-content ui-corner-all" value="Search">'
        ].join('');

        document.body.appendChild(probe);

        try {
            const tile = probe.querySelector('#itemtablesmall tbody tr');
            const tileSurface = probe.querySelector('#pypluginstore-theme-card-sample');
            const tileName = probe.querySelector('#itemtablesmall td#name, #itemtablesmall tr td:first-child');
            const tileValue = probe.querySelector('#itemtablesmall td#bigtext, #itemtablesmall tr td:first-child + td');
            const tileStatus = probe.querySelector('#itemtablesmall td#status, #itemtablesmall tr td:first-child + td + td + td');
            const button = probe.querySelector('.btnstyle3');
            const primaryButton = probe.querySelector('.btnstyle3-sel');
            const input = probe.querySelector('input');
            if (!tile || !tileName) return;

            const rowStyle = window.getComputedStyle(tile);
            const tileSurfaceStyle = tileSurface ? window.getComputedStyle(tileSurface) : null;
            const tileStyle = hasUsefulSurface(tileSurfaceStyle) ? tileSurfaceStyle : rowStyle;
            const nameStyle = window.getComputedStyle(tileName);
            const valueStyle = tileValue ? window.getComputedStyle(tileValue) : tileStyle;
            const statusStyle = tileStatus ? window.getComputedStyle(tileStatus) : valueStyle;
            const buttonStyle = button ? window.getComputedStyle(button) : null;
            const primaryButtonStyle = primaryButton ? window.getComputedStyle(primaryButton) : buttonStyle;
            const inputStyle = input ? window.getComputedStyle(input) : null;

            const tileHoverSelectors = [
                'div.item.itemBlock:hover',
                '.item.itemBlock:hover',
                '.itemBlock:hover',
                '.item:hover',
                'table#itemtablesmall tbody tr:hover',
                'table#itemtablesmall tr:hover'
            ];
            const titleHoverSelectors = [
                'div.item.itemBlock:hover td#name',
                '.item.itemBlock:hover td#name',
                '.itemBlock:hover td#name',
                '.item:hover td#name',
                'table#itemtablesmall tr:hover td#name',
                'table#itemtablesmall tr:hover td:first-child'
            ];
            const hoverTileBg = readFirstMatchingCssDeclaration(tileHoverSelectors, ['background', 'background-color']);
            const hoverTileShadow = readFirstMatchingCssDeclaration(tileHoverSelectors, ['box-shadow']);
            const hoverNameBg = readFirstMatchingCssDeclaration(titleHoverSelectors, ['background', 'background-color']);
            const hoverNameColor = readFirstMatchingCssDeclaration(titleHoverSelectors, ['color']);
            const hoverNameBorder = readFirstMatchingCssDeclaration(titleHoverSelectors, ['border-color', 'border-top-color']);
            const buttonHoverBg = readFirstMatchingCssDeclaration(['a.btnstyle3:hover', '.btnstyle3:hover'], ['background', 'background-color']);

            const setThemeVar = function(name, value) {
                if (isUsefulThemeValue(value)) {
                    container.style.setProperty(name, value);
                }
            };

            const cardBg = firstUsefulThemeValue(
                readBackground(tileStyle),
                readCssVariable('--dz-widget-bg'),
                readCssVariable('--dz-panel-bg'),
                readBackground(rowStyle)
            );
            const cardBorder = firstUsefulThemeValue(
                readBorder(tileStyle),
                readCssVariable('--dz-widget-border'),
                readBorder(rowStyle)
            );
            const cardPadding = firstUsefulThemeValue(
                readBox(tileStyle, 'padding'),
                readCssVariable('--dz-widget-padding'),
                readBox(rowStyle, 'padding')
            );
            const cardRadius = firstUsefulThemeValue(
                readRadius(tileStyle),
                readCssVariable('--dz-widget-border-radius'),
                readRadius(rowStyle)
            );
            const cardShadow = firstUsefulThemeValue(
                tileStyle.boxShadow,
                readCssVariable('--dz-widget-shadow'),
                rowStyle.boxShadow
            );

            const pageBg = firstUsefulThemeValue(
                readEffectiveBackgroundForElement(container),
                readEffectiveBackgroundForElement(container.parentElement),
                readEffectiveBackgroundForElement(document.body),
                readEffectiveBackgroundForElement(document.documentElement),
                '#ffffff'
            );
            const cardHoverBg = firstUsefulThemeValue(hoverTileBg, readCssVariable('--dz-widget-hover-bg'), cardBg);
            const titleBg = firstUsefulThemeValue(readBackground(nameStyle), readCssVariable('--dz-widget-name-bg'), cardBg);
            const titleHoverBg = firstUsefulThemeValue(hoverNameBg, readCssVariable('--dz-widget-hover-name-bg'), titleBg, cardHoverBg, cardBg);
            const cardTextCandidate = firstUsefulThemeValue(tileStyle.color, valueStyle.color, readCssVariable('--dz-widget-text'));
            const mutedTextCandidate = firstUsefulThemeValue(statusStyle.color, valueStyle.color, tileStyle.color, readCssVariable('--dz-widget-text'));
            const titleTextCandidate = firstUsefulThemeValue(nameStyle.color, readCssVariable('--dz-widget-name-text'), cardTextCandidate);
            const titleHoverTextCandidate = firstUsefulThemeValue(hoverNameColor, readCssVariable('--dz-widget-text'), titleTextCandidate);
            const headingTextCandidate = firstUsefulThemeValue(nameStyle.color, tileStyle.color, readCssVariable('--dz-panel-text'), readCssVariable('--dz-body-text'));

            const readableCardText = ensureReadableColor(cardBg, cardTextCandidate, {
                baseBackground: pageBg,
                minContrast: 4.5
            });
            const readableMutedText = ensureReadableColor(cardBg, mutedTextCandidate, {
                baseBackground: pageBg,
                minContrast: 3.2,
                lightText: '#b8c7d8',
                darkText: '#4a5562'
            });
            const readableTitleText = ensureReadableColor(titleBg, titleTextCandidate, {
                baseBackground: cardBg,
                minContrast: 4.5
            });
            const readableTitleHoverText = ensureReadableColor(titleHoverBg, titleHoverTextCandidate, {
                baseBackground: firstUsefulThemeValue(cardHoverBg, cardBg),
                minContrast: 4.5
            });
            const readableHeadingText = ensureReadableColor(pageBg, headingTextCandidate, {
                minContrast: 4.5
            });

            setThemeVar('--dz-pps-card-bg', cardBg);
            setThemeVar('--dz-pps-panel-bg', cardBg);
            setThemeVar('--dz-pps-card-bg-hover', cardHoverBg);
            setThemeVar('--dz-pps-card-border', cardBorder);
            setThemeVar('--dz-pps-card-padding', cardPadding);
            setThemeVar('--dz-pps-card-font-family', firstUsefulThemeValue(tileStyle.fontFamily, rowStyle.fontFamily));
            setThemeVar('--dz-pps-radius', cardRadius);
            setThemeVar('--dz-pps-shadow', cardShadow);
            setThemeVar('--dz-pps-shadow-hover', firstUsefulThemeValue(hoverTileShadow, readCssVariable('--dz-widget-hover-shadow'), cardShadow));
            setThemeVar('--dz-pps-text', readableCardText);
            setThemeVar('--dz-pps-text-muted', readableMutedText);

            setThemeVar('--dz-pps-card-title-bg', titleBg);
            setThemeVar('--dz-pps-card-title-bg-hover', titleHoverBg);
            setThemeVar('--dz-pps-card-title-text', readableTitleText);
            setThemeVar('--dz-pps-card-title-text-hover', readableTitleHoverText);
            setThemeVar('--dz-pps-text-heading', readableHeadingText);
            setThemeVar('--dz-pps-card-title-border', readBorder(nameStyle));
            setThemeVar('--dz-pps-card-title-border-hover', firstUsefulThemeValue(hoverNameBorder, readCssVariable('--dz-widget-hover-name-border'), nameStyle.borderTopColor));
            setThemeVar('--dz-pps-card-title-radius', readRadius(nameStyle));
            setThemeVar('--dz-pps-card-title-padding', readBox(nameStyle, 'padding'));
            setThemeVar('--dz-pps-card-title-margin', readSafeTitleMargin(nameStyle));
            setThemeVar('--dz-pps-card-title-height', readSafeTitleHeight(nameStyle));
            setThemeVar('--dz-pps-card-title-font-family', nameStyle.fontFamily);
            setThemeVar('--dz-pps-card-title-font-size', nameStyle.fontSize);
            setThemeVar('--dz-pps-card-title-font-weight', nameStyle.fontWeight);
            setThemeVar('--dz-pps-card-title-line-height', readSafeTitleLineHeight(nameStyle));
            setThemeVar('--dz-pps-border', firstUsefulThemeValue(nameStyle.borderTopColor, tileStyle.borderTopColor, readCssVariable('--dz-widget-name-border')));
            setThemeVar('--dz-pps-border-hover', firstUsefulThemeValue(hoverNameBorder, readCssVariable('--dz-widget-hover-name-border'), nameStyle.borderTopColor));

            let buttonEffectiveBg = firstUsefulThemeValue(cardBg, pageBg);
            if (buttonStyle) {
                const buttonBg = readBackground(buttonStyle);
                buttonEffectiveBg = firstUsefulThemeValue(buttonBg, cardBg, pageBg);
                setThemeVar('--dz-pps-button-bg', buttonBg);
                setThemeVar('--dz-pps-button-hover-bg', firstUsefulThemeValue(buttonHoverBg, buttonBg));
                setThemeVar('--dz-pps-button-text', ensureReadableColor(buttonEffectiveBg, buttonStyle.color, {
                    baseBackground: firstUsefulThemeValue(cardBg, pageBg),
                    minContrast: 4.5
                }));
                setThemeVar('--dz-pps-button-border', readBorder(buttonStyle));
                setThemeVar('--dz-pps-button-radius', readRadius(buttonStyle));
                setThemeVar('--dz-pps-button-padding', readBox(buttonStyle, 'padding'));
                setThemeVar('--dz-pps-button-line-height', buttonStyle.lineHeight);
                setThemeVar('--dz-pps-button-font-family', buttonStyle.fontFamily);
                setThemeVar('--dz-pps-button-font-weight', buttonStyle.fontWeight);
            }

            if (primaryButtonStyle) {
                const primaryButtonBg = readBackground(primaryButtonStyle);
                const primaryEffectiveBg = firstUsefulThemeValue(primaryButtonBg, buttonEffectiveBg, cardBg, pageBg);
                setThemeVar('--dz-pps-button-primary-bg', primaryButtonBg);
                setThemeVar('--dz-pps-button-primary-text', ensureReadableColor(primaryEffectiveBg, primaryButtonStyle.color, {
                    baseBackground: firstUsefulThemeValue(cardBg, pageBg),
                    minContrast: 4.5
                }));
                setThemeVar('--dz-pps-button-primary-border', readBorder(primaryButtonStyle));
            }

            if (inputStyle) {
                const inputBg = readBackground(inputStyle);
                const inputEffectiveBg = firstUsefulThemeValue(inputBg, cardBg, pageBg);
                setThemeVar('--dz-pps-input-bg', inputBg);
                setThemeVar('--dz-pps-input-text', ensureReadableColor(inputEffectiveBg, inputStyle.color, {
                    baseBackground: firstUsefulThemeValue(cardBg, pageBg),
                    minContrast: 4.5
                }));
                setThemeVar('--dz-pps-input-placeholder', ensureReadableColor(inputEffectiveBg, inputStyle.color, {
                    baseBackground: firstUsefulThemeValue(cardBg, pageBg),
                    minContrast: 3.0,
                    lightText: '#b8c7d8',
                    darkText: '#5c6670'
                }));
                setThemeVar('--dz-pps-input-border', readBorder(inputStyle));
            }

            container.setAttribute('data-domoticz-theme-look', hasUsefulSurface(tileSurfaceStyle) ? 'computed-surface' : 'computed-row');
        } catch (e) {
            console.warn('Could not derive Domoticz theme tile look', e);
        } finally {
            if (probe.parentNode) {
                probe.parentNode.removeChild(probe);
            }
        }
    }

    function isUsefulThemeValue(value) {
        if (typeof value !== 'string') return false;
        const clean = value.trim();
        return clean !== '' &&
            clean !== 'initial' &&
            clean !== 'inherit' &&
            clean !== 'normal' &&
            clean !== 'none' &&
            clean !== 'rgba(0, 0, 0, 0)' &&
            clean !== 'transparent';
    }

    function firstUsefulThemeValue() {
        for (let index = 0; index < arguments.length; index++) {
            if (isUsefulThemeValue(arguments[index])) {
                return String(arguments[index]).trim();
            }
        }
        return '';
    }

    function ensureReadableColor(backgroundValue, preferredColor, options) {
        const config = options || {};
        const baseBackground = config.baseBackground || '#ffffff';
        const backgroundColor = resolveCssColor(backgroundValue, baseBackground) || resolveCssColor(baseBackground, '#ffffff') || { r: 255, g: 255, b: 255, a: 1 };
        const preferredTextColor = resolveCssColor(preferredColor, rgbaColorToString(backgroundColor));
        const minimumContrast = typeof config.minContrast === 'number' ? config.minContrast : 4.5;

        if (isUsefulThemeValue(preferredColor) && preferredTextColor && contrastRatio(backgroundColor, preferredTextColor) >= minimumContrast) {
            return String(preferredColor).trim();
        }

        const lightText = config.lightText || '#f3f7fb';
        const darkText = config.darkText || '#17202a';
        const lightColor = resolveCssColor(lightText, '#000000');
        const darkColor = resolveCssColor(darkText, '#ffffff');
        if (!lightColor || !darkColor) {
            return firstUsefulThemeValue(preferredColor, lightText);
        }

        return contrastRatio(backgroundColor, darkColor) >= contrastRatio(backgroundColor, lightColor) ? darkText : lightText;
    }

    function resolveCssColor(value, fallbackValue) {
        const colors = extractCssColorTokens(value)
            .map(parseCssColorToken)
            .filter(Boolean);
        let color = null;
        for (let index = 0; index < colors.length; index++) {
            if (colors[index].a > 0.01) {
                color = colors[index];
            }
        }
        if (!color) {
            return fallbackValue ? resolveCssColor(fallbackValue) : null;
        }
        if (color.a < 1) {
            const base = fallbackValue ? resolveCssColor(fallbackValue) : null;
            return blendColors(color, base || { r: 255, g: 255, b: 255, a: 1 });
        }
        return color;
    }

    function extractCssColorTokens(value) {
        if (typeof value !== 'string') return [];
        const matches = value.match(/rgba?\([^)]*\)|#[0-9a-fA-F]{3,8}\b|\btransparent\b|\bblack\b|\bwhite\b/gi);
        return matches || [];
    }

    function parseCssColorToken(token) {
        if (typeof token !== 'string') return null;
        const clean = token.trim().toLowerCase();
        if (clean === 'transparent') return { r: 0, g: 0, b: 0, a: 0 };
        if (clean === 'black') return { r: 0, g: 0, b: 0, a: 1 };
        if (clean === 'white') return { r: 255, g: 255, b: 255, a: 1 };

        if (clean.charAt(0) === '#') {
            let hex = clean.slice(1);
            if (hex.length === 3 || hex.length === 4) {
                hex = hex.split('').map(character => character + character).join('');
            }
            if (hex.length === 6 || hex.length === 8) {
                const r = parseInt(hex.slice(0, 2), 16);
                const g = parseInt(hex.slice(2, 4), 16);
                const b = parseInt(hex.slice(4, 6), 16);
                const a = hex.length === 8 ? parseInt(hex.slice(6, 8), 16) / 255 : 1;
                if ([r, g, b, a].every(Number.isFinite)) {
                    return { r, g, b, a };
                }
            }
            return null;
        }

        const rgbMatch = clean.match(/^rgba?\((.*)\)$/);
        if (!rgbMatch) return null;
        const normalized = rgbMatch[1].trim().replace(/\s*\/\s*/g, ' ');
        const parts = normalized.indexOf(',') !== -1
            ? normalized.split(',').map(part => part.trim()).filter(Boolean)
            : normalized.split(/\s+/).filter(Boolean);
        if (parts.length < 3) return null;
        const r = parseCssColorChannel(parts[0]);
        const g = parseCssColorChannel(parts[1]);
        const b = parseCssColorChannel(parts[2]);
        const a = parts.length > 3 ? parseCssAlpha(parts[3]) : 1;
        if (![r, g, b, a].every(Number.isFinite)) return null;
        return { r, g, b, a };
    }

    function parseCssColorChannel(value) {
        const number = parseFloat(value);
        if (!Number.isFinite(number)) return NaN;
        const channel = String(value).trim().endsWith('%') ? number * 2.55 : number;
        return Math.max(0, Math.min(255, channel));
    }

    function parseCssAlpha(value) {
        const number = parseFloat(value);
        if (!Number.isFinite(number)) return NaN;
        const alpha = String(value).trim().endsWith('%') ? number / 100 : number;
        return Math.max(0, Math.min(1, alpha));
    }

    function blendColors(foreground, background) {
        const alpha = foreground.a + background.a * (1 - foreground.a);
        if (alpha <= 0) return { r: 0, g: 0, b: 0, a: 0 };
        return {
            r: (foreground.r * foreground.a + background.r * background.a * (1 - foreground.a)) / alpha,
            g: (foreground.g * foreground.a + background.g * background.a * (1 - foreground.a)) / alpha,
            b: (foreground.b * foreground.a + background.b * background.a * (1 - foreground.a)) / alpha,
            a: alpha
        };
    }

    function relativeLuminance(color) {
        const channels = [color.r, color.g, color.b].map(channel => {
            const value = channel / 255;
            return value <= 0.03928 ? value / 12.92 : Math.pow((value + 0.055) / 1.055, 2.4);
        });
        return 0.2126 * channels[0] + 0.7152 * channels[1] + 0.0722 * channels[2];
    }

    function contrastRatio(firstColor, secondColor) {
        const firstLuminance = relativeLuminance(firstColor);
        const secondLuminance = relativeLuminance(secondColor);
        const lighter = Math.max(firstLuminance, secondLuminance);
        const darker = Math.min(firstLuminance, secondLuminance);
        return (lighter + 0.05) / (darker + 0.05);
    }

    function rgbaColorToString(color) {
        return 'rgba(' + Math.round(color.r) + ', ' + Math.round(color.g) + ', ' + Math.round(color.b) + ', ' + color.a + ')';
    }

    function readEffectiveBackgroundForElement(element) {
        if (!window.getComputedStyle || !element || element.nodeType !== 1) return '';
        let current = element;
        while (current && current.nodeType === 1) {
            const background = readBackground(window.getComputedStyle(current));
            if (isUsefulThemeValue(background) && resolveCssColor(background)) {
                return background;
            }
            current = current.parentElement;
        }
        return '';
    }

    function hasUsefulSurface(style) {
        if (!style) return false;
        return isUsefulThemeValue(readBackground(style)) ||
            isUsefulThemeValue(style.boxShadow) ||
            isUsefulThemeValue(readBorder(style));
    }

    function readCssVariable(name) {
        if (!window.getComputedStyle) return '';
        const container = document.getElementById('pypluginstore-container');
        const sources = [container, document.body, document.documentElement].filter(Boolean);
        for (let index = 0; index < sources.length; index++) {
            const value = window.getComputedStyle(sources[index]).getPropertyValue(name).trim();
            if (isUsefulThemeValue(value)) {
                return value;
            }
        }
        return '';
    }

    function readFirstMatchingCssDeclaration(selectorNeedles, propertyNames) {
        const needles = Array.isArray(selectorNeedles) ? selectorNeedles : [selectorNeedles];
        for (let index = 0; index < needles.length; index++) {
            const value = readMatchingCssDeclaration(needles[index], propertyNames);
            if (isUsefulThemeValue(value)) {
                return value;
            }
        }
        return '';
    }

    function readMatchingCssDeclaration(selectorNeedle, propertyNames) {
        if (!document.styleSheets) return '';
        let matchedValue = '';
        const inspectRules = function(rules) {
            if (!rules) return;
            for (let index = 0; index < rules.length; index++) {
                const rule = rules[index];
                if (rule.cssRules) {
                    inspectRules(rule.cssRules);
                    continue;
                }
                if (!rule.selectorText || !rule.style) continue;
                const selectors = rule.selectorText.split(',').map(part => part.trim());
                const matches = selectors.some(selector => selector.indexOf(selectorNeedle) !== -1);
                if (!matches) continue;
                for (const propertyName of propertyNames) {
                    const value = rule.style.getPropertyValue(propertyName);
                    if (isUsefulThemeValue(value)) {
                        matchedValue = value.trim();
                    }
                }
            }
        };

        for (let index = 0; index < document.styleSheets.length; index++) {
            try {
                inspectRules(document.styleSheets[index].cssRules);
            } catch (e) {}
        }
        return matchedValue;
    }

    function readBackground(style) {
        if (!style) return '';
        if (style.backgroundImage && style.backgroundImage !== 'none') {
            return style.background;
        }
        return style.backgroundColor;
    }

    function readBorder(style) {
        if (!style) return '';
        const borderStyle = style.borderTopStyle;
        const borderWidth = style.borderTopWidth;
        const borderColor = style.borderTopColor;
        if (!borderStyle || borderStyle === 'none' || borderWidth === '0px') {
            return '';
        }
        return borderWidth + ' ' + borderStyle + ' ' + borderColor;
    }

    function readBox(style, property) {
        if (!style) return '';
        const top = style[property + 'Top'];
        const right = style[property + 'Right'];
        const bottom = style[property + 'Bottom'];
        const left = style[property + 'Left'];
        if (!top || !right || !bottom || !left) return '';
        return top + ' ' + right + ' ' + bottom + ' ' + left;
    }

    function readSafeTitleMargin(style) {
        const values = parseCssLengthBox(readBox(style, 'margin'));
        if (!values) return '0 0 5px 0';

        const top = Math.max(0, values[0]);
        const right = Math.max(0, values[1]);
        const bottom = Math.max(5, values[2]);
        const left = Math.max(0, values[3]);
        return [top, right, bottom, left].map(formatCssPixelLength).join(' ');
    }

    function readSafeTitleHeight(style) {
        const height = parseCssPixelLength(style && style.height);
        if (!Number.isFinite(height) || height <= 0) return '24px';
        return formatCssPixelLength(Math.max(24, height));
    }

    function readSafeTitleLineHeight(style) {
        const lineHeight = style ? style.lineHeight : '';
        const lineHeightPixels = parseCssPixelLength(lineHeight);
        if (!Number.isFinite(lineHeightPixels) || lineHeightPixels <= 0) {
            return firstUsefulThemeValue(lineHeight, 'normal');
        }
        return formatCssPixelLength(Math.max(18, lineHeightPixels));
    }

    function parseCssLengthBox(value) {
        if (typeof value !== 'string') return null;
        const parts = value.trim().split(/\s+/).filter(Boolean);
        if (parts.length !== 4) return null;
        const numbers = parts.map(parseCssPixelLength);
        return numbers.every(Number.isFinite) ? numbers : null;
    }

    function parseCssPixelLength(value) {
        if (typeof value !== 'string') return NaN;
        const clean = value.trim();
        if (clean === '' || clean === 'auto' || clean === 'normal') return NaN;
        const match = clean.match(/^(-?\d+(?:\.\d+)?)px$/i);
        return match ? parseFloat(match[1]) : NaN;
    }

    function formatCssPixelLength(value) {
        const rounded = Math.round(value * 100) / 100;
        return (Math.abs(rounded - Math.round(rounded)) < 0.001 ? Math.round(rounded) : rounded) + 'px';
    }

    function readRadius(style) {
        if (!style) return '';
        const topLeft = style.borderTopLeftRadius;
        const topRight = style.borderTopRightRadius;
        const bottomRight = style.borderBottomRightRadius;
        const bottomLeft = style.borderBottomLeftRadius;
        if (!topLeft || !topRight || !bottomRight || !bottomLeft) return '';
        if (topLeft === topRight && topLeft === bottomRight && topLeft === bottomLeft) {
            return topLeft;
        }
        return topLeft + ' ' + topRight + ' ' + bottomRight + ' ' + bottomLeft;
    }

    async function init() {
        setLayoutMode(readStoredLayoutMode(), false);
        setupThemeObserver();

        if (document.getElementById('pypluginstore-status').innerText !== 'Initializing...') {
            return;
        }

        const installedToggle = document.getElementById('installed-toggle');
        const layoutToggle = document.getElementById('layout-toggle');
        installedToggle.checked = readStoredInstalledFilter();
        document.getElementById('search-box').oninput = filterAndRender;
        installedToggle.onchange = function() {
            writeStoredInstalledFilter(installedToggle.checked);
            filterAndRender();
        };
        if (layoutToggle) {
            layoutToggle.onchange = function() {
                setLayoutMode(layoutToggle.checked ? LAYOUT_THEME : LAYOUT_PYPLUGIN, true);
            };
        }
        document.getElementById('refresh-update-status').onclick = refreshUpdateStatus;
        document.getElementById('restart-domoticz').onclick = restartDomoticz;
        document.getElementById('sort-select').onchange = function() {
            currentSort = this.value;
            filterAndRender();
        };

        setStatus("Finding API bridge...");
        try {
            await findApiBridgeDevices();

            if (!payloadIdx || !triggerIdx) {
                setStatus("Error: PyPluginStore devices not found (" + (payloadIdx ? 'Y' : 'N') + "/" + (triggerIdx ? 'Y' : 'N') + "). Please ensure the plugin is added in Hardware.");
                return;
            }

            console.log("Found bridge devices: Payload=" + payloadIdx + ", Trigger=" + triggerIdx);
            loadPlugins();
        } catch (e) {
            console.error("Init Error:", e);
            setStatus("Failed to connect to Domoticz API: " + e.message);
        }
    }

    function scanApiBridgeDevices(devices) {
        if (!devices) return;

        for (const device of devices) {
            if (device.ID === 'PPM_API_PAYLOAD') {
                payloadIdx = device.idx;
            }
            if (device.ID === 'PPM_API_TRIGGER') {
                triggerIdx = device.idx;
            }
        }
    }

    async function fetchApiBridgeDevices(query) {
        const url = 'json.htm?type=command&param=getdevices&' + query + '&t=' + Date.now();
        console.log("Fetching bridge devices from " + url);
        const req = await fetch(url);
        if (!req.ok) throw new Error("HTTP error " + req.status);
        const devices = await req.json();
        scanApiBridgeDevices(devices.result);
    }

    async function findApiBridgeDevices() {
        const lookups = [
            'filter=all&used=all&displayhidden=1',
            'used=true&displayhidden=1',
            'filter=all&used=all',
        ];

        for (const query of lookups) {
            await fetchApiBridgeDevices(query);
            if (payloadIdx && triggerIdx) return;
        }
    }

    async function sendCommand(action, data) {
        if (isLoading) {
            alert("An operation is already in progress. Please wait.");
            return null;
        }
        isLoading = true;

        try {
            await clearApiBridgePayload();
            const txId = Date.now().toString();
            const payload = JSON.stringify({ action, tx_id: txId, ...data });

            console.log("Sending command: " + action, payload);
            await fetch(`json.htm?type=command&param=udevice&idx=${payloadIdx}&nvalue=0&svalue=${encodeURIComponent(payload)}`);
            await fetch(`json.htm?type=command&param=switchlight&idx=${triggerIdx}&switchcmd=On`);

            return await pollResponse(action, txId);
        } finally {
            isLoading = false;
        }
    }

    async function clearApiBridgePayload() {
        if (!payloadIdx) return;

        try {
            await fetch(`json.htm?type=command&param=udevice&idx=${payloadIdx}&nvalue=0&svalue=`);
        } catch (e) {
            console.warn("Could not clear API bridge payload", e);
        }
    }

    async function pollResponse(action, txId, retries = 120) {
        console.log("Polling for response to " + action + " (tx_id: " + txId + ")...");
        for (let i = 0; i < retries; i++) {
            await new Promise(r => setTimeout(r, 1000));
            try {
                const req = await fetch(`json.htm?type=command&param=getdevices&rid=${payloadIdx}&t=` + Date.now());
                const resp = await req.json();

                if (resp.result && resp.result.length > 0) {
                    const dataStr = resp.result[0].Data;
                    try {
                        const data = JSON.parse(dataStr);
                        const isExpectedActionResponse = data.action === action && data.tx_id === txId;
                        const isExpectedErrorResponse = data.status === 'error' && !data.action && data.tx_id === txId;
                        if (isExpectedActionResponse || isExpectedErrorResponse) {
                            console.log("Received response:", data);
                            await clearApiBridgePayload();
                            return data;
                        }
                    } catch (e) {}
                }
            } catch (e) {
                console.error("Polling error", e);
            }
        }
        throw new Error("Timeout waiting for plugin response.");
    }

    async function loadPlugins() {
        setStatus("Loading plugins from registry...");
        try {
            const response = await sendCommand('list_plugins', {});
            if (response && response.status === 'success') {
                pluginCache = response.data;
                installedCache = response.installed;
                localCache = response.local_plugins || [];
                updateStatusCache = response.update_status || {};
                versionsCache = response.versions || {};
                platformCache = response.platforms || {};
                installedMatchDetailsCache = response.installed_match_details || {};
                managerKey = response.manager_key || null;
                filterAndRender();
                setStatus(`Loaded ${Object.keys(response.data).length} plugins.`);
            } else {
                setStatus("Error loading plugins: " + (response ? response.message : "Unknown error"));
            }
        } catch (e) {
            setStatus(e.message);
        }
    }

    function filterAndRender() {
        if (!pluginCache) return;

        const searchQuery = document.getElementById('search-box').value.toLowerCase();
        const showInstalledOnly = document.getElementById('installed-toggle').checked;

        const filteredKeys = Object.keys(pluginCache).filter(key => {
            const info = pluginCache[key] || [];
            const description = String(info[2] || '').toLowerCase();
            const displayName = formatPluginDisplayName(key).toLowerCase();
            const matchesSearch = description.includes(searchQuery) ||
                key.toLowerCase().includes(searchQuery) ||
                displayName.includes(searchQuery);
            const isInstalled = installedCache.indexOf(key) !== -1;

            if (showInstalledOnly && !isInstalled) return false;
            return matchesSearch;
        });

        const filteredData = {};
        filteredKeys.forEach(key => filteredData[key] = pluginCache[key]);

        renderPlugins(filteredData, installedCache);
    }

    function sortPlugins(pluginData, sortBy) {
        const keys = Object.keys(pluginData);

        switch(sortBy) {
            case 'name':
                return keys.sort((a, b) => formatPluginDisplayName(a).localeCompare(formatPluginDisplayName(b)));
            case 'name-desc':
                return keys.sort((a, b) => formatPluginDisplayName(b).localeCompare(formatPluginDisplayName(a)));
            case 'updated':
                return keys.sort((a, b) => {
                    const dateA = new Date(pluginData[a][4] || 0);
                    const dateB = new Date(pluginData[b][4] || 0);
                    return dateB - dateA;
                });
            case 'updated-oldest':
                return keys.sort((a, b) => {
                    const dateA = new Date(pluginData[a][4] || 0);
                    const dateB = new Date(pluginData[b][4] || 0);
                    return dateA - dateB;
                });
            default:
                return keys.sort((a, b) => formatPluginDisplayName(a).localeCompare(formatPluginDisplayName(b)));
        }
    }

    function formatPluginDisplayName(pluginName) {
        const displayName = String(pluginName || '')
            .replace(/^domoticz[-_ ]+plugin[-_ ]+/i, '')
            .replace(/^domoticz[-_ ]+for[-_ ]+/i, '')
            .replace(/^domoticz[-_ ]+/i, '')
            .replace(/[-_ ]+domoticz[-_ ]+plugin$/i, '')
            .replace(/[-_ ]+for[-_ ]+domoticz$/i, '')
            .replace(/[-_ ]+domoticz$/i, '')
            .replace(/^[-_ ]+|[-_ ]+$/g, '');
        return displayName || pluginName;
    }

    function stripRepoUrl(url) {
        let stripped = String(url || '').trim().replace(/\/$/, '');
        const markers = [
            '/-/tree/',
            '/-/blob/',
            '/tree/',
            '/blob/',
            '/src/branch/',
            '/raw/branch/'
        ];
        for (const marker of markers) {
            if (stripped.indexOf(marker) !== -1) {
                stripped = stripped.split(marker, 1)[0];
                break;
            }
        }
        return stripped.replace(/\.git$/, '');
    }

    function encodeRepoPath(pathParts) {
        return pathParts.map(part => encodeURIComponent(part)).join('/');
    }

    function encodeBranchPath(branch) {
        return String(branch || '').split('/').filter(Boolean).map(part => encodeURIComponent(part)).join('/');
    }

    function parseRepoReference(author, repo) {
        const cleanAuthor = String(author || '').trim();
        const cleanRepo = String(repo || '').trim().replace(/\.git$/, '');
        const fallbackHost = 'github.com';

        if (cleanAuthor.startsWith('http://') || cleanAuthor.startsWith('https://')) {
            try {
                const strippedUrl = stripRepoUrl(cleanAuthor);
                const parsed = new URL(strippedUrl);
                const pathParts = parsed.pathname
                    .replace(/^\/+|\/+$/g, '')
                    .split('/')
                    .filter(Boolean)
                    .map(part => decodeURIComponent(part.replace(/\.git$/, '')));
                return { host: parsed.hostname.toLowerCase(), pathParts };
            } catch (error) {
                return { host: fallbackHost, pathParts: [cleanAuthor, cleanRepo].filter(Boolean) };
            }
        }

        const sshMatch = cleanAuthor.match(/^(?:[^@:/]+@)?([^:/]+):(.+)$/);
        if (sshMatch) {
            const host = sshMatch[1].toLowerCase();
            const pathParts = sshMatch[2].replace(/\.git$/, '').split('/').filter(Boolean);
            return { host, pathParts };
        }

        const authorParts = cleanAuthor.split('/').filter(Boolean);
        const firstAuthorPart = (authorParts[0] || '').toLowerCase();
        if (firstAuthorPart.indexOf('.') !== -1 && authorParts.length > 1) {
            const pathParts = authorParts.slice(1);
            if (cleanRepo) pathParts.push(cleanRepo);
            return { host: firstAuthorPart, pathParts };
        }

        return { host: fallbackHost, pathParts: [cleanAuthor, cleanRepo].filter(Boolean) };
    }

    function buildRepoUrl(author, repo, branch) {
        const repoReference = parseRepoReference(author, repo);
        if (!repoReference.host || repoReference.pathParts.length === 0) {
            return '';
        }
        const repoUrl = stripRepoUrl('https://' + repoReference.host + '/' + encodeRepoPath(repoReference.pathParts));
        const encodedBranch = encodeBranchPath(branch);
        if (!encodedBranch) {
            return repoUrl;
        }
        if (repoReference.host === 'github.com') {
            return repoUrl + '/tree/' + encodedBranch;
        }
        if (repoReference.host === 'gitlab.com') {
            return repoUrl + '/-/tree/' + encodedBranch;
        }
        if (repoReference.host === 'codeberg.org') {
            return repoUrl + '/src/branch/' + encodedBranch;
        }
        return repoUrl;
    }

    function parseVersionParts(version) {
        const cleanVersion = String(version || '').trim().replace(/^v/i, '');
        if (!cleanVersion) return [];
        return cleanVersion.split(/[.+_-]/).map(part => {
            if (/^\d+$/.test(part)) return { type: 'number', value: Number(part) };
            return { type: 'text', value: part.toLowerCase() };
        });
    }

    function compareVersions(leftVersion, rightVersion) {
        const left = parseVersionParts(leftVersion);
        const right = parseVersionParts(rightVersion);
        const maxLength = Math.max(left.length, right.length);
        for (let index = 0; index < maxLength; index++) {
            const leftPart = left[index] || { type: 'number', value: 0 };
            const rightPart = right[index] || { type: 'number', value: 0 };
            if (leftPart.type === 'number' && rightPart.type === 'number') {
                if (leftPart.value !== rightPart.value) return leftPart.value > rightPart.value ? 1 : -1;
                continue;
            }
            const leftValue = String(leftPart.value);
            const rightValue = String(rightPart.value);
            if (leftValue !== rightValue) return leftValue > rightValue ? 1 : -1;
        }
        return 0;
    }

    function formatVersionStatus(verInfo, updateStatus) {
        const versionParts = [];
        const installedVersion = verInfo && verInfo.installed ? String(verInfo.installed).replace(/^v/i, '') : '';
        const remoteVersion = verInfo && verInfo.available ? String(verInfo.available).replace(/^v/i, '') : '';
        if (installedVersion) versionParts.push('Installed: v' + installedVersion);
        if (remoteVersion && updateStatus === 'available') {
            const comparison = installedVersion ? compareVersions(remoteVersion, installedVersion) : 0;
            const remoteLabel = comparison > 0 ? 'Available' : 'Remote';
            const remoteText = remoteLabel + ': v' + remoteVersion + (comparison < 0 ? ' (installed is newer)' : '');
            versionParts.push(remoteText);
        }
        return versionParts.join(' | ');
    }

    function formatAuthorDisplay(author, repo) {
        const repoReference = parseRepoReference(author, repo);
        if (!repoReference.host || repoReference.pathParts.length === 0) {
            return String(author || '').trim();
        }
        const ownerPath = repoReference.pathParts.length > 1
            ? repoReference.pathParts.slice(0, -1)
            : repoReference.pathParts;
        return repoReference.host + '/' + ownerPath.join('/');
    }

    function renderPlugins(pluginData, installedList) {
        const container = document.getElementById('plugins-list');
        if (!container) return;
        container.innerHTML = '';

        const keys = sortPlugins(pluginData, currentSort);

        if (keys.length === 0) {
            const empty = document.createElement('div');
            empty.style.gridColumn = '1/-1';
            empty.style.textAlign = 'center';
            empty.style.padding = '40px';
            empty.style.color = 'var(--pps-text-muted)';
            empty.textContent = 'No plugins match your filters.';
            container.appendChild(empty);
            return;
        }

        const now = new Date();

        for (const key of keys) {
            const info = pluginData[key] || [];
            const author = String(info[0] || '');
            const repo = String(info[1] || '');
            const description = String(info[2] || '');
            const branch = String(info[3] || '');
            const updatedAt = info[4];
            const isInstalled = installedList.indexOf(key) !== -1;
            const isLocal = localCache.indexOf(key) !== -1;
            const updateStatus = updateStatusCache[key] || 'unknown';
            const platforms = platformCache[key] || ['unknown'];
            const displayName = formatPluginDisplayName(key);
            const matchDetails = installedMatchDetailsCache[key] || {};
            const isGit = matchDetails.is_git !== false;
            const hasRepoMismatch = Boolean(matchDetails.registry_mismatch || matchDetails.repo_mismatch || matchDetails.branch_mismatch || updateStatus === 'mismatch');

            let timeStr = "";
            if (updatedAt) {
                const date = new Date(updatedAt);
                const diffMs = now - date;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

                if (diffDays === 0) timeStr = "today";
                else if (diffDays === 1) timeStr = "yesterday";
                else if (diffDays < 30) timeStr = diffDays + " days ago";
                else if (diffDays < 365) timeStr = Math.floor(diffDays / 30) + " months ago";
                else timeStr = Math.floor(diffDays / 365) + " years ago";
            }

            const card = document.createElement('div');
            card.className = 'pps-card';

            const header = document.createElement('div');
            header.className = 'pps-card-header';

            const headerLeft = document.createElement('div');
            headerLeft.className = 'pps-card-header-left';

            const pluginTitle = document.createElement('span');
            pluginTitle.className = 'pps-plugin-title';
            pluginTitle.textContent = displayName;
            pluginTitle.title = displayName;
            headerLeft.appendChild(pluginTitle);

            if (isInstalled) {
                const badge = document.createElement('span');
                badge.className = 'installed-badge';
                badge.textContent = 'Installed';
                headerLeft.appendChild(badge);

                if (isGit === false) {
                    const nonGitBadge = document.createElement('span');
                    nonGitBadge.className = 'non-git-badge';
                    nonGitBadge.textContent = 'Non-Git';
                    nonGitBadge.title = 'This plugin was not installed using Git/GitHub. Updates through PyPluginStore are not available.';
                    headerLeft.appendChild(nonGitBadge);
                }

                if (hasRepoMismatch) {
                    const mismatchBadge = document.createElement('span');
                    mismatchBadge.className = 'repo-mismatch-badge';
                    mismatchBadge.textContent = 'Repo mismatch';
                    mismatchBadge.title = 'The installed Git checkout does not match the configured registry repo or branch.';
                    headerLeft.appendChild(mismatchBadge);
                }
            }

            header.appendChild(headerLeft);

            if (isLocal) {
                const localBadge = document.createElement('span');
                localBadge.className = 'local-badge';
                localBadge.textContent = 'Local';
                header.appendChild(localBadge);
            }

            const knownPlatforms = platforms.filter(platformName => platformName === 'linux' || platformName === 'windows');
            if (knownPlatforms.length > 0) {
                const platformBadges = document.createElement('div');
                platformBadges.className = 'platform-badges';
                knownPlatforms.forEach(platformName => {
                    const platformBadge = document.createElement('span');
                    platformBadge.className = 'platform-badge platform-badge-' + platformName;
                    platformBadge.textContent = platformName === 'linux' ? 'Linux' : 'Windows';
                    platformBadges.appendChild(platformBadge);
                });
                header.appendChild(platformBadges);
            }

            const desc = document.createElement('div');
            desc.className = 'pps-card-desc';
            desc.textContent = description;

            const meta = document.createElement('div');
            meta.className = 'pps-card-meta';
            meta.appendChild(document.createTextNode('Author: ' + formatAuthorDisplay(author, repo)));
            meta.appendChild(document.createElement('br'));
            meta.appendChild(document.createTextNode('Repo: ' + repo + (branch ? ' (' + branch + ')' : '')));

            if (timeStr) {
                meta.appendChild(document.createElement('br'));
                meta.appendChild(document.createTextNode('Last updated: ' + timeStr));
            }

            if (isInstalled && versionsCache && versionsCache[key]) {
                const verInfo = versionsCache[key];
                if (verInfo.installed || verInfo.available) {
                    meta.appendChild(document.createElement('br'));
                    meta.appendChild(document.createTextNode(formatVersionStatus(verInfo, updateStatus)));
                }
            }

            if (isInstalled && hasRepoMismatch) {
                const installedRepo = String(matchDetails.installed_repo || 'unknown repo');
                const installedBranch = String(matchDetails.installed_branch || '');
                const mismatchDetail = document.createElement('span');
                mismatchDetail.className = 'repo-mismatch-detail';
                mismatchDetail.textContent = 'Installed checkout: ' + installedRepo + (installedBranch ? ' (' + installedBranch + ')' : '');
                mismatchDetail.title = 'Add a matching registry_local.json entry to manage updates for this repo and branch.';
                meta.appendChild(document.createElement('br'));
                meta.appendChild(mismatchDetail);
            }

            const actions = document.createElement('div');
            actions.className = 'pps-actions';

            const repoLink = document.createElement('a');
            repoLink.className = 'btn-info btn-link';
            repoLink.href = buildRepoUrl(author, repo, branch);
            repoLink.target = '_blank';
            repoLink.rel = 'noopener noreferrer';
            repoLink.textContent = 'Repo';
            actions.appendChild(repoLink);

            if (isInstalled) {
                const updateButton = document.createElement('button');
                if (isGit === false) {
                    updateButton.className = 'btn-update btn-update-disabled';
                    updateButton.title = 'Cannot update non-Git plugins';
                    updateButton.disabled = true;
                } else if (hasRepoMismatch) {
                    updateButton.className = 'btn-update btn-update-disabled';
                    updateButton.title = 'Add a matching registry_local.json override before updating this checkout';
                    updateButton.disabled = true;
                } else {
                    const updateClass = updateStatus === 'available' ? 'btn-update btn-update-available' : 'btn-update btn-update-current';
                    const verInfo = versionsCache && versionsCache[key] ? versionsCache[key] : {};
                    const installedVersion = verInfo.installed || '';
                    const remoteVersion = verInfo.available || '';
                    const installedIsNewer = updateStatus === 'available' && installedVersion && remoteVersion && compareVersions(remoteVersion, installedVersion) < 0;
                    const updateTitle = installedIsNewer ? 'Update resets this plugin to the configured branch' :
                        (updateStatus === 'available' ? 'Update available' :
                        (updateStatus === 'current' ? 'Already up-to-date' : 'Update status unknown'));
                    updateButton.className = updateClass;
                    updateButton.title = updateTitle;
                }
                updateButton.dataset.key = key;
                updateButton.dataset.action = 'update';
                updateButton.type = 'button';
                updateButton.textContent = 'Update';
                actions.appendChild(updateButton);

                if (key !== managerKey) {
                    const removeButton = document.createElement('button');
                    removeButton.className = 'btn-remove';
                    removeButton.dataset.key = key;
                    removeButton.dataset.action = 'remove';
                    removeButton.type = 'button';
                    removeButton.textContent = 'Remove';
                    actions.appendChild(removeButton);
                }
            } else {
                const installButton = document.createElement('button');
                installButton.className = 'btn-install';
                installButton.dataset.key = key;
                installButton.dataset.action = 'install';
                installButton.type = 'button';
                installButton.textContent = 'Install';
                actions.appendChild(installButton);
            }

            card.appendChild(header);
            card.appendChild(desc);
            card.appendChild(meta);
            card.appendChild(actions);
            container.appendChild(card);
        }

        container.querySelectorAll('button[data-action]').forEach(btn => {
            btn.onclick = function() {
                handleAction(this.getAttribute('data-action'), this.getAttribute('data-key'));
            };
        });
    }

    async function handleAction(action, pluginKey) {
        if (action === 'remove' && !confirm(`Are you sure you want to remove ${pluginKey}?`)) {
            return;
        }

        setStatus(`Executing ${action} for ${pluginKey}... This may take a moment.`);
        try {
            const response = await sendCommand(action, { plugin_key: pluginKey });
            if (response && response.status === 'success') {
                const successMessage = response.message || `Successfully completed ${action} for ${pluginKey}. Domoticz restart may be required.`;
                alert(successMessage);
                setStatus(successMessage);
                if (!(action === 'update' && pluginKey === managerKey)) {
                    await loadPlugins();
                }
            } else {
                alert(`Error during ${action}: ` + (response ? response.message : "Unknown error"));
                setStatus("Operation failed.");
            }
        } catch (e) {
            alert("Error: " + e.message);
            setStatus("Operation failed.");
        }
    }

    async function refreshUpdateStatus() {
        if (!pluginCache) return;

        setStatus("Refreshing update status...");
        try {
            const response = await sendCommand('refresh_update_status', {});
            if (response && response.status === 'success') {
                pluginCache = response.data || pluginCache;
                installedCache = response.installed || installedCache;
                localCache = response.local_plugins || localCache;
                updateStatusCache = response.update_status || {};
                versionsCache = response.versions || versionsCache;
                platformCache = response.platforms || platformCache;
                installedMatchDetailsCache = response.installed_match_details || installedMatchDetailsCache;
                managerKey = response.manager_key || managerKey;
                filterAndRender();
                setStatus("Update status refreshed.");
            } else {
                alert("Refresh failed: " + (response ? response.message : "Unknown error"));
                setStatus("Refresh failed.");
            }
        } catch (e) {
            alert("Refresh failed: " + e.message);
            setStatus("Refresh failed.");
        }
    }

    async function restartDomoticz() {
        if (!confirm("Restart Domoticz now? The web interface will disconnect while the service restarts.")) {
            return;
        }

        setStatus("Requesting Domoticz restart...");
        try {
            const response = await sendCommand('restart_domoticz', {});
            if (response && response.status === 'success') {
                setStatus("Domoticz restart requested. Reconnect after the service comes back online.");
            } else {
                alert("Restart request failed: " + (response ? response.message : "Unknown error"));
                setStatus("Restart request failed.");
            }
        } catch (e) {
            alert("Restart request failed: " + e.message);
            setStatus("Restart request failed.");
        }
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(init, 100);
    } else {
        document.addEventListener('DOMContentLoaded', init);
    }

    window.addEventListener('load', function() {
        setLayoutMode(readStoredLayoutMode(), false);
        init();
    });
})();
</script>
