    #pypluginstore-container[data-layout="pyplugin"] .pps-card-desc {
        margin-bottom: 14px;

        margin: 0 0 14px 0;

    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-card {
        border-radius: 8px !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-card-header {
        border-radius: 0 !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .filters,

        border-radius: 8px !important;

    #pypluginstore-container[data-layout="pyplugin"] .filters input[type="text"],
    #pypluginstore-container[data-layout="pyplugin"] .sort-controls select {
        border-radius: 6px !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-switch {
        width: 46px !important;
        height: 22px !important;
        padding: 0 !important;
        margin: 0 !important;
        border: 0 !important;
        border-radius: 999px !important;
        background: transparent !important;
        box-shadow: none !important;
        overflow: visible !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-switch input {
        opacity: 0 !important;
        width: 0 !important;
        height: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        border: 0 !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-slider {
        border-radius: 999px !important;
        background: rgba(107, 130, 160, 0.15) !important;
        border: 1px solid rgba(74, 158, 218, 0.28) !important;
        box-shadow: none !important;
        box-sizing: border-box !important;
        overflow: hidden !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-slider:before {
        content: "" !important;
        display: block !important;
        width: 16px !important;
        height: 16px !important;
        left: 2px !important;
        bottom: 2px !important;
        border: 0 !important;
        border-radius: 50% !important;
        background-color: #8ea8c0 !important;
        box-shadow: none !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-switch input:checked + .pps-slider {
        background: rgba(58, 191, 126, 0.3) !important;
        border-color: #3abf7e !important;
    }

    #pypluginstore-container[data-layout="pyplugin"] .pps-switch input:checked + .pps-slider:before {
        translate: 24px 0 !important;
        background-color: #3abf7e !important;
    }

    #pypluginstore-container .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-block-end: 24px;
        padding-block-end: 16px;
        border-block-end: var(--pps-divider-border);
    }

    #pypluginstore-container .header-title {
        display: flex;
        align-items: center;
        gap: 12px;
        min-inline-size: min(220px, 100%);
    }

    #pypluginstore-container .app-icon {
        width: 44px;
        height: 44px;
        object-fit: contain;
        flex: 0 0 auto;
    }

    #pypluginstore-container h1 {
        margin: 0;
        font-size: 1.4em;
        font-weight: 600;
        color: var(--pps-text-heading);
        letter-spacing: 0;
    }

    #pypluginstore-status {
        font-weight: 500;
        font-size: 0.85em;
        color: var(--pps-panel-text);
        background: var(--pps-panel-bg);
        border: var(--pps-panel-border);
        padding: 5px 12px;
        border-radius: var(--pps-radius);
        box-shadow: var(--pps-panel-shadow);
    }

    #pypluginstore-container .header-actions {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
    }

    #pypluginstore-container .filters {
        display: flex;
        gap: 14px;
        margin-block-end: 20px;
        align-items: center;
        background: var(--pps-panel-bg);
        padding: 14px 18px;
        border-radius: var(--pps-radius);
        border: var(--pps-panel-border);
        flex-wrap: wrap;
        box-shadow: var(--pps-panel-shadow);
    }

    #pypluginstore-container .filters input[type="text"] {
        flex-grow: 1;
        padding: 8px 14px;
        border: var(--pps-input-border);
        border-block-end: var(--pps-input-border-block-end);
        border-radius: var(--pps-input-radius);
        font-size: 0.9em;
        min-inline-size: min(200px, 100%);
        background: var(--pps-input-bg);
        color: var(--pps-input-text);
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    #pypluginstore-container .filters input[type="text"]:focus-visible {
        border-color: var(--pps-border-hover);
        box-shadow: 0 0 0 3px var(--pps-focus-ring);
    }

    #pypluginstore-container .filters input[type="text"]::placeholder {
        color: var(--pps-input-placeholder);
        opacity: var(--pps-input-placeholder-opacity);
    }

    #pypluginstore-container .filter-control {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0;
        font-weight: 500;
        font-size: 0.9em;
        cursor: pointer;
        user-select: none;
        color: var(--pps-panel-text);
    }

    #pypluginstore-container .filter-control-label {
        color: inherit;
        line-height: 1.2;
        white-space: nowrap;
    }

    #pypluginstore-container .layout-choice {
        white-space: nowrap;
    }

    #pypluginstore-container .sort-controls {
        cursor: default;
    }

    #pypluginstore-container .sort-controls .filter-control-label {
        font-size: 0.85em;
    }

    #pypluginstore-container .sort-controls select {
        padding: 8px 12px;
        border: var(--pps-input-border);
        border-block-end: var(--pps-input-border-block-end);
        border-radius: var(--pps-input-radius);
        font-size: 0.88em;
        background: var(--pps-input-bg);
        color: var(--pps-panel-text);
        cursor: pointer;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    #pypluginstore-container .sort-controls select:focus-visible {
        border-color: var(--pps-border-hover);
        box-shadow: 0 0 0 3px var(--pps-focus-ring);
    }

    #pypluginstore-container .pps-switch {
        position: relative;
        display: inline-block;
        width: 46px;
        height: 22px;
    }

    #pypluginstore-container .pps-switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    #pypluginstore-container .pps-slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: var(--pps-button-bg);
        transition: .3s;
        border-radius: 22px;
        border: var(--pps-button-border);
    }

    #pypluginstore-container .pps-slider:before {
        position: absolute;
        content: "";
        block-size: 16px;
        inline-size: 16px;
        inset-inline-start: 2px;
        inset-block-end: 2px;
        background-color: var(--pps-text-muted);
        transition: translate .3s, background-color .3s;
        border-radius: 50%;
    }

                <h3 id="local-registry-form-title">Add local entry</h3>
                <p class="local-registry-form-intro">Saving validates the entry locally. It does not contact the repository or install the plugin.</p>
                <form id="local-registry-form" class="local-registry-form" novalidate>
                    <div id="local-registry-public-seed-field" class="local-registry-field">
                        <label for="local-registry-public-seed">Start from a public plugin</label>
                        <select id="local-registry-public-seed">
                            <option value="">Blank entry</option>
                        </select>
                    </div>

                    <div class="local-registry-field">
                        <label for="local-registry-key">Plugin key</label>
                        <input id="local-registry-key" name="key" type="text" maxlength="128" required aria-describedby="local-registry-key-error" autocomplete="off">
                        <span id="local-registry-key-error" class="local-registry-field-error"></span>
                    </div>

                    <div class="local-registry-field">
                        <label for="local-registry-source">Repository source</label>
                        <input id="local-registry-source" name="repository_source" type="text" maxlength="1000" required aria-describedby="local-registry-source-error" autocomplete="off" spellcheck="false" placeholder="https://github.com/owner/repository">
                        <span id="local-registry-source-error" class="local-registry-field-error"></span>
                    </div>

                    <div class="local-registry-field">
                        <label for="local-registry-description">Description</label>
                        <textarea id="local-registry-description" name="description" maxlength="500" aria-describedby="local-registry-description-error"></textarea>
                        <span id="local-registry-description-error" class="local-registry-field-error"></span>
                    </div>

                    <div class="local-registry-field">
                        <label for="local-registry-branch">Branch</label>
                        <input id="local-registry-branch" name="branch" type="text" maxlength="255" required value="master" aria-describedby="local-registry-branch-error" autocomplete="off" spellcheck="false">
                        <span id="local-registry-branch-error" class="local-registry-field-error"></span>
                    </div>

                    <div class="local-registry-actions">
                        <button id="local-registry-cancel" type="button">Back to entries</button>
                        <button id="local-registry-save" type="submit">Save entry</button>
                    </div>
                </form>
            </section>
        </div>
    </dialog>

    <div id="plugins-list" class="grid">
        <!-- Plugins will be rendered here -->
    </div>
</div>

<script>
(function() {
    console.log("PyPluginStore script starting...");
    let payloadIdx = null;
    let triggerIdx = null;
    let isLoading = false;
    let pluginCache = null;
    let installedCache = [];
    let localCache = [];
    let updateStatusCache = {};
    let versionsCache = {};
    let managementCache = {};
    let platformCache = {};
    let installedMatchDetailsCache = {};
    let managerKey = null;
    let selfUpdateState = null;
    let localRegistryEntries = [];
    let localRegistryRevision = '';
    let localRegistryPath = '';
    let localRegistryReadOnly = false;
    let localRegistryOriginalKey = '';
    let localRegistryFormDirty = false;
    let localRegistryPendingDeleteKey = '';
    let currentSort = 'name';
    let themeRefreshTimer = null;
    let themeObserver = null;
    const INSTALLED_FILTER_STORAGE_KEY = 'pypluginstore.installedOnly';
    const LAYOUT_STORAGE_KEY = 'pypluginstore.layoutMode';
    const LOCAL_REGISTRY_PAYLOAD_MAX_LENGTH = 2000;
    const LAYOUT_PYPLUGIN = 'pyplugin';
    const LAYOUT_THEME = 'theme';
    const THEME_TILE_HOVER_SELECTORS = [
        '#holder #dashcontent .row .span3 .item table[id^="item"] > tbody > tr:hover',
        '#holder #dashcontent .row .span4 .item table[id^="item"] > tbody > tr:hover',
        '#dashcontent .row .span3 .item table[id^="item"] > tbody > tr:hover',
        '#dashcontent .row .span4 .item table[id^="item"] > tbody > tr:hover',
        '#holder .row .item table[id^="item"] > tbody > tr:hover',
        '#holder .row .item table[id^="item"] tbody tr:hover',
        '.item table[id^="item"] > tbody > tr:hover',
        'table[id^="item"] > tbody > tr:hover',
        'div.item.itemBlock:hover',
        '.item.itemBlock:hover',
        '.itemBlock:hover',
        '.item:hover',
        'table#itemtablesmall tbody tr:hover',
        'table#itemtablesmall tr:hover'
    ];
    const THEME_TITLE_HOVER_SELECTORS = [
        '#holder #dashcontent .row .span3 .item table[id^="item"] > tbody > tr:hover td#name',
        '#holder #dashcontent .row .span4 .item table[id^="item"] > tbody > tr:hover td#name',
        '#dashcontent .row .span3 .item table[id^="item"] > tbody > tr:hover td#name',
        '#dashcontent .row .span4 .item table[id^="item"] > tbody > tr:hover td#name',
        '#holder .row .item table[id^="item"] > tbody > tr:hover td#name',
        '#holder .row .item table[id^="item"] > tbody > tr:hover td:first-child',
        '.item table[id^="item"] > tbody > tr:hover td#name',
        'table[id^="item"] > tbody > tr:hover td#name',
        'div.item.itemBlock:hover td#name',
        '.item.itemBlock:hover td#name',
        '.itemBlock:hover td#name',
        '.item:hover td#name',
        'table#itemtablesmall tr:hover td#name',
        'table#itemtablesmall tr:hover td:first-child'
    ];
    const THEME_BUTTON_SELECTORS = ['a.btnstyle3', '.btnstyle3', '.btnsmall', '.btn.btn-default', '.btn'];
    const THEME_BUTTON_HOVER_SELECTORS = ['a.btnstyle3:hover', '.btnstyle3:hover', '.btnsmall:hover', '.btn.btn-default:hover', '.btn:hover'];

    function setStatus(msg) {
        console.log("PyPluginStore Status: " + msg);
        const el = document.getElementById('pypluginstore-status');
        if (el) el.innerText = msg;
    }

    function readStoredInstalledFilter() {
        try {
            return window.localStorage.getItem(INSTALLED_FILTER_STORAGE_KEY) === 'true';
        } catch (e) {
            return false;
        }
    }

    function writeStoredInstalledFilter(checked) {
        try {
            window.localStorage.setItem(INSTALLED_FILTER_STORAGE_KEY, checked ? 'true' : 'false');
        } catch (e) {}
    }

    function readStoredLayoutMode() {
        try {
            const stored = window.localStorage.getItem(LAYOUT_STORAGE_KEY);
            return stored === LAYOUT_PYPLUGIN ? LAYOUT_PYPLUGIN : LAYOUT_THEME;
        } catch (e) {
            return LAYOUT_THEME;
        }
    }

    function writeStoredLayoutMode(mode) {
        try {
            window.localStorage.setItem(LAYOUT_STORAGE_KEY, mode);
        } catch (e) {}
    }

    function setLayoutMode(mode, persist) {
        const layoutMode = mode === LAYOUT_PYPLUGIN ? LAYOUT_PYPLUGIN : LAYOUT_THEME;
        const container = document.getElementById('pypluginstore-container');
        if (container) {
            container.setAttribute('data-layout', layoutMode);
            if (layoutMode === LAYOUT_PYPLUGIN) {
                clearComputedDomoticzThemeVars(container);
                container.setAttribute('data-domoticz-theme-look', 'pyplugin');
                if (themeRefreshTimer) {
                    clearTimeout(themeRefreshTimer);
                    themeRefreshTimer = null;
                }
            }
        }

        const toggle = document.getElementById('layout-toggle');
        if (toggle) {
            toggle.checked = layoutMode === LAYOUT_THEME;
        }

        const label = document.getElementById('layout-toggle-label');
        if (label) {
            label.innerText = layoutMode === LAYOUT_THEME ? 'Domoticz theme' : 'PyPlugin layout';
        }

        if (persist) {
            writeStoredLayoutMode(layoutMode);
        }

        if (layoutMode === LAYOUT_THEME) {
            applyDomoticzThemeTileLook();
        }
    }

    function clearComputedDomoticzThemeVars(container) {
        if (!container || !container.style) return;
        const properties = [];
        for (let index = 0; index < container.style.length; index++) {
            const propertyName = container.style.item(index);
            if (propertyName.indexOf('--dz-pps-') === 0) {
                properties.push(propertyName);
            }
        }
        properties.forEach(propertyName => container.style.removeProperty(propertyName));
    }

    function setupThemeObserver() {
        if (themeObserver || !document.body || !window.MutationObserver) return;
        themeObserver = new MutationObserver(scheduleDomoticzThemeRefresh);
        themeObserver.observe(document.body, {
            attributes: true,
            attributeFilter: ['class', 'style']
        });
    }

    function scheduleDomoticzThemeRefresh() {
        const container = document.getElementById('pypluginstore-container');
        if (!container || container.getAttribute('data-layout') !== LAYOUT_THEME) return;
        if (readStoredLayoutMode() !== LAYOUT_THEME) return;

        if (themeRefreshTimer) {
            clearTimeout(themeRefreshTimer);
        }
        themeRefreshTimer = setTimeout(function() {
            themeRefreshTimer = null;
            applyDomoticzThemeTileLook();
        }, 80);
    }

    function applyDomoticzThemeTileLook() {
        const container = document.getElementById('pypluginstore-container');
        if (!container || !document.body || !window.getComputedStyle) return;
        if (container.getAttribute('data-layout') === LAYOUT_PYPLUGIN) return;
        clearComputedDomoticzThemeVars(container);

        const probeContext = createDomoticzThemeProbe();
        const probe = probeContext.probe;
        probeContext.mount.appendChild(probe);

        try {
            const themeProbe = readDomoticzThemeProbe(probe);
            if (!themeProbe) return;

            const {
                rowStyle,
                tileSurfaceStyle,
                tileRowStyle,
                tileStyle,
                nameStyle,
                valueStyle,
                statusStyle,
                buttonStyle,
                primaryButtonStyle,
                input,
                inputStyle,
                contentControlStyle
            } = themeProbe;
            const hoverStyles = readDomoticzThemeHoverStyles();
            const hoverTileBg = hoverStyles.tile.background;
            const hoverTileShadow = hoverStyles.tile.shadow;
            const hoverTileBorder = hoverStyles.tile.border;
            const hoverNameBg = hoverStyles.title.background;
            const hoverNameColor = hoverStyles.title.color;
            const hoverNameBorder = hoverStyles.title.border;
            const buttonBackgroundDeclaration = readFirstMatchingCssDeclarationInfo(THEME_BUTTON_SELECTORS, ['background', 'background-color']);
            const buttonHoverDeclaration = readFirstMatchingCssDeclarationInfo(THEME_BUTTON_HOVER_SELECTORS, ['background', 'background-color']);
            const buttonHoverBg = normalizeBackgroundUrls(buttonHoverDeclaration.value, buttonHoverDeclaration.baseUrl);

            const domoticzMainBg = readCssVariable('--main-bg-color');
            const domoticzItemBg = readCssVariable('--main-item-bg-color');
            const domoticzLegacyItemBg = readCssVariable('--ColorDashboard_Block_or_Span3and4');
            const domoticzLegacyItemHoverBg = readCssVariable('--ColorDashboard_Block_or_Span3and4_HOVER');
            const domoticzMainText = readCssVariable('--main-text-color');
            const domoticzLegacyText = readCssVariable('--ColorFontName');
            const domoticzSecondaryText = readCssVariable('--secondary-text-color');
            const domoticzAccent = firstUsefulThemeValue(readCssVariable('--dz-accent'), readCssVariable('--main-blue-color'), readCssVariable('--dz-accent-color'));

            const themeVars = createDomoticzThemeVarWriters(container);
            const setThemeVar = themeVars.setThemeVar;
            const setRequiredThemeVar = themeVars.setRequiredThemeVar;

            const cardBg = firstUsefulThemeValue(
                readBackground(tileStyle),
                domoticzItemBg,
                domoticzLegacyItemBg,
                readCssVariable('--dz-widget-bg'),
                readCssVariable('--dz-panel-bg'),
                readBackground(rowStyle)
            );
            const cardBorder = firstUsefulThemeValueOrNone(
                readBorder(tileStyle),
                readCssVariable('--dz-widget-border'),
                readBorder(rowStyle)
            );
            const cardPadding = firstUsefulThemeValue(
                readBox(tileStyle, 'padding'),
                readCssVariable('--dz-widget-padding'),
                readBox(rowStyle, 'padding')
            );
            const cardRadius = firstUsefulThemeValue(
                readRadius(tileStyle),
                readCssVariable('--dz-widget-border-radius'),
                readRadius(rowStyle)
            );
            const cardShadow = firstUsefulThemeValue(
                tileStyle.boxShadow,
                readCssVariable('--dz-widget-shadow'),
                rowStyle.boxShadow
            );
            const contentControlBorderBlockEnd = readBorderSide(contentControlStyle, 'Bottom');
            const inputBorderBlockEnd = inputStyle ? chooseInputBorderBlockEnd(
                readBorderSide(inputStyle, 'Bottom'),
                contentControlBorderBlockEnd,
                domoticzAccent
            ) : '';

            const pageSurfaceBg = firstUsefulThemeValue(
                readEffectiveBackgroundForElement(container),
                readEffectiveBackgroundForElement(container.parentElement),
                domoticzMainBg,
                readCssVariable('--ColorDashboard_Background'),
                readEffectiveBackgroundForElement(document.body),
                readEffectiveBackgroundForElement(document.documentElement)
            );
            const pageBg = firstUsefulThemeValue(pageSurfaceBg, '#ffffff');
            const cardHoverBg = firstResolvedThemeValue(hoverTileBg, readCssVariable('--dz-widget-hover-bg'), domoticzLegacyItemHoverBg, cardBg);
            const titleBg = firstUsefulThemeValue(readBackground(nameStyle), readCssVariable('--dz-widget-name-bg'), cardBg);
            const titleHoverBg = firstUsefulThemeValue(hoverNameBg, readCssVariable('--dz-widget-hover-name-bg'), titleBg, cardHoverBg, cardBg);
            const cardTextCandidate = firstUsefulThemeValue(tileStyle.color, valueStyle.color, domoticzMainText, domoticzLegacyText, readCssVariable('--dz-widget-text'));
            const mutedTextCandidate = firstUsefulThemeValue(statusStyle.color, domoticzSecondaryText, valueStyle.color, tileStyle.color, domoticzLegacyText, readCssVariable('--dz-widget-text'));
            const titleTextCandidate = firstUsefulThemeValue(nameStyle.color, readCssVariable('--dz-widget-name-text'), cardTextCandidate);
            const titleHoverTextCandidate = firstUsefulThemeValue(hoverNameColor, readCssVariable('--dz-widget-text'), titleTextCandidate);
            const headingTextCandidate = firstUsefulThemeValue(nameStyle.color, tileStyle.color, readCssVariable('--dz-panel-text'), readCssVariable('--dz-body-text'));

            const readableCardText = ensureReadableColor(cardBg, cardTextCandidate, {
                baseBackground: pageBg,
                minContrast: 4.5
            });
            const readableMutedText = ensureReadableColor(cardBg, mutedTextCandidate, {
                baseBackground: pageBg,
                minContrast: 3.2,
                lightText: '#b8c7d8',
                darkText: '#4a5562'
            });
            const readableTitleText = ensureReadableColor(titleBg, titleTextCandidate, {
                baseBackground: cardBg,
                minContrast: 4.5
            });
            const readableTitleHoverText = ensureReadableColor(titleHoverBg, titleHoverTextCandidate, {
                baseBackground: firstUsefulThemeValue(cardHoverBg, cardBg),
                minContrast: 4.5
            });
            const readableHeadingText = ensureReadableColor(pageBg, headingTextCandidate, {
                minContrast: 4.5
            });
            const widgetHoverShadow = readCssVariable('--dz-widget-hover-shadow');
            const cardHasTransparentBorder = isNoneThemeValue(cardBorder) ||
                isTransparentBorder(cardBorder) ||
                isTransparentThemeValue(tileStyle.borderTopColor);
            const cardThemeExposesShadowHover = isUsefulThemeValue(hoverTileShadow) ||
                isUsefulThemeValue(widgetHoverShadow);
            const cardCanInferAccentShadowHover = isUsefulThemeValue(cardShadow) &&
                isUsefulThemeValue(domoticzAccent);
            const cardUsesShadowHoverBorder = cardHasTransparentBorder && (
                cardThemeExposesShadowHover ||
                cardCanInferAccentShadowHover
            );
            const cardShadowHover = firstUsefulThemeValue(
                hoverTileShadow,
                widgetHoverShadow,
                cardUsesShadowHoverBorder && isUsefulThemeValue(domoticzAccent) ? '0 0 0 2px ' + domoticzAccent : '',
                cardShadow
            );
            const cardTitleRadius = cardUsesShadowHoverBorder ? firstUsefulThemeValue(cardRadius, readRadius(nameStyle)) : readRadius(nameStyle);
            const visibleTitleBorderColor = readVisibleBorderColor(nameStyle);
            const visibleCardBorderColor = readVisibleBorderColor(tileStyle);
            const themeBorderColor = firstUsefulThemeValue(
                visibleTitleBorderColor,
                visibleCardBorderColor,
                readCssVariable('--dz-widget-name-border')
            );
            const contentControlAccentBorderColor = borderColorMatches(inputBorderBlockEnd, domoticzAccent) ? domoticzAccent : '';
            const themeBorderHoverColor = firstUsefulThemeValue(
                hoverNameBorder,
                readCssVariable('--dz-widget-hover-name-border'),
                contentControlAccentBorderColor,
                domoticzAccent,
                themeBorderColor
            );
            const cardBorderHover = firstUsefulThemeValue(
                hoverTileBorder,
                readCssVariable('--dz-widget-hover-border'),
                cardUsesShadowHoverBorder ? 'transparent' : '',
                domoticzAccent
            );
            const rawPanelBg = firstUsefulThemeValue(
                readCssVariable('--dz-panel-bg'),
                readCssVariable('--dz-modal-bg'),
                readCssVariable('--ColorPanelBackground')
            );
            const panelIsTransparent = !isUsefulThemeValue(rawPanelBg);
            const panelBg = panelIsTransparent ? 'transparent' : rawPanelBg;
            const panelBorder = panelIsTransparent ? '0 solid transparent' : firstUsefulThemeValue(
                readCssVariable('--dz-panel-border'),
                readCssVariable('--dz-border'),
                readCssVariable('--dz-border-color'),
                readBorder(tileRowStyle),
                cardBorder,
                '1px solid transparent'
            );
            const panelShadow = panelIsTransparent ? 'none' : firstUsefulThemeValue(
                readCssVariable('--dz-panel-shadow'),
                readCssVariable('--dz-widget-shadow'),
                cardShadow,
                'none'
            );
            const panelText = ensureReadableColor(panelBg, firstUsefulThemeValue(
                readCssVariable('--dz-panel-text'),
                readCssVariable('--dz-modal-text'),
                readCssVariable('--dz-body-text'),
                readableHeadingText
            ), {
                baseBackground: pageBg,
                minContrast: 4.5
            });
            const dividerBorder = firstUsefulThemeValue(
                readCssVariable('--dz-border'),
                readCssVariable('--dz-border-color'),
                readCssVariable('--dz-input-border'),
                readBorder(nameStyle),
                cardBorder,
                panelBorder
            );

            setThemeVar('--dz-pps-bg', pageSurfaceBg);
            setThemeVar('--dz-pps-primary', domoticzAccent);
            setThemeVar('--dz-pps-primary-hover', domoticzAccent);
            setThemeVar('--dz-pps-card-border-hover', cardBorderHover, { allowTransparent: true });
            setThemeVar('--dz-pps-success', readCssVariable('--color-success'));
            setThemeVar('--dz-pps-danger', readCssVariable('--color-error'));
            setThemeVar('--dz-pps-warning', readCssVariable('--color-warning'));
            setThemeVar('--dz-pps-grid-gap', readGap(tileRowStyle));
            setThemeVar('--dz-pps-card-bg', cardBg);
            setRequiredThemeVar('--dz-pps-panel-bg', panelBg);
            setRequiredThemeVar('--dz-pps-panel-text', panelText);
            setRequiredThemeVar('--dz-pps-panel-border', panelBorder);
            setRequiredThemeVar('--dz-pps-panel-shadow', panelShadow);
            setThemeVar('--dz-pps-divider-border', dividerBorder, { allowNone: true });
            setThemeVar('--dz-pps-card-bg-hover', cardHoverBg);
            setThemeVar('--dz-pps-card-border', cardBorder, { allowNone: true });
            setThemeVar('--dz-pps-card-padding', cardPadding);
            setThemeVar('--dz-pps-card-font-family', firstUsefulThemeValue(tileStyle.fontFamily, rowStyle.fontFamily));
            setThemeVar('--dz-pps-radius', cardRadius);
            setThemeVar('--dz-pps-shadow', cardShadow, { allowNone: true });
            setThemeVar('--dz-pps-shadow-hover', cardShadowHover, { allowNone: true });
            setThemeVar('--dz-pps-text', readableCardText);
            setThemeVar('--dz-pps-text-muted', readableMutedText);

            setThemeVar('--dz-pps-card-title-bg', titleBg);
            setThemeVar('--dz-pps-card-title-bg-hover', titleHoverBg);
            setThemeVar('--dz-pps-card-title-text', readableTitleText);
            setThemeVar('--dz-pps-card-title-text-hover', readableTitleHoverText);
            setThemeVar('--dz-pps-text-heading', readableHeadingText);
            setThemeVar('--dz-pps-card-title-border', readBorder(nameStyle), { allowNone: true });
            setThemeVar('--dz-pps-card-title-border-hover', firstUsefulThemeValue(hoverNameBorder, readCssVariable('--dz-widget-hover-name-border'), themeBorderHoverColor));
            setThemeVar('--dz-pps-card-title-radius', cardTitleRadius);
            setThemeVar('--dz-pps-card-title-padding', readBox(nameStyle, 'padding'));
            setThemeVar('--dz-pps-card-title-margin', readSafeTitleMargin(nameStyle));
            setThemeVar('--dz-pps-card-title-height', readSafeTitleHeight(nameStyle));
            setThemeVar('--dz-pps-card-title-font-family', nameStyle.fontFamily);
            setThemeVar('--dz-pps-card-title-font-size', nameStyle.fontSize);
            setThemeVar('--dz-pps-card-title-font-weight', nameStyle.fontWeight);
            setThemeVar('--dz-pps-card-title-line-height', readSafeTitleLineHeight(nameStyle));
            setThemeVar('--dz-pps-border', firstUsefulThemeValue(themeBorderColor, domoticzAccent));
            setThemeVar('--dz-pps-border-hover', themeBorderHoverColor);

            const buttonEffectiveBg = applyDomoticzButtonThemeVars({
                setThemeVar,
                buttonStyle,
                buttonBackgroundDeclaration,
                buttonHoverBg,
                cardBg,
                pageBg,
                cardBorder,
                domoticzAccent
            });
            applyDomoticzPrimaryButtonThemeVars({
                setThemeVar,
                primaryButtonStyle,
                buttonEffectiveBg,
                cardBg,
                pageBg
            });
            applyDomoticzInputThemeVars({
                setThemeVar,
                setRequiredThemeVar,
                input,
                inputStyle,
                inputBorderBlockEnd,
                cardBg,
                pageBg
            });

            container.setAttribute('data-domoticz-theme-look', hasUsefulSurface(tileSurfaceStyle) ? 'computed-surface' : 'computed-row');
        } catch (e) {
            console.warn('Could not derive Domoticz theme tile look', e);
        } finally {
            if (probe.parentNode) {
                probe.parentNode.removeChild(probe);
            }
        }
    }

    function createDomoticzThemeProbe() {
        const probe = document.createElement('div');
        probe.id = 'pypluginstore-theme-probe';
        probe.setAttribute('aria-hidden', 'true');
        probe.style.cssText = [
            'position:absolute',
            'left:-10000px',
            'top:-10000px',
            'width:320px',
            'height:auto',
            'visibility:hidden',
            'pointer-events:none',
            'z-index:-1'
        ].join(';');

        const holder = document.getElementById('holder');
        const dashContent = document.getElementById('dashcontent');
        const tileProbeMarkup = [
            '<div id="dashcontent">',
            '<section>',
            '<div class="row">',
            '<div class="span3 span4">',
            '<div id="pypluginstore-theme-card-sample" class="item itemBlock">',
            '<section>',
            '<table id="itemtablesmall"><tbody><tr>',
            '<td id="name">Domoticz tile</td>',
            '<td id="bigtext">42</td>',
            '<td id="img"></td>',
            '<td id="status" class="status">Plugin status</td>',
            '<td id="lastupdate">Theme sample</td>',
            '</tr></tbody></table>',
            '</section>',
            '</div>',
            '</div>',
            '</div>',
            '</section>',
            '</div>'
        ].join('');
        const controlProbeMarkup = [
            '<div id="search"><input type="text" id="searchInput" class="text ui-widget-content ui-corner-all" placeholder="Search"></div>',
            '<div id="pypluginstore-theme-main-control-sample">',
            '<input type="text" id="pypluginstore-theme-content-input" class="text ui-widget-content ui-corner-all" placeholder="Filter">',
            '<select id="pypluginstore-theme-select-sample" class="ui-corner-all"><option>Sort</option></select>',
            '</div>',
            '<a class="btnstyle3" href="#">Button</a>',
            '<a class="btnsmall" href="#">Small</a>',
            '<button class="btn btn-default" type="button">Default</button>',
            '<a class="btnstyle3-sel" href="#">Primary</a>',
            '<a class="btnstyle3-dis" href="#">Disabled</a>'
        ].join('');

        probe.innerHTML = (holder ? tileProbeMarkup : '<div id="holder">' + tileProbeMarkup + '</div>') + controlProbeMarkup;
        return {
            probe,
            mount: dashContent || holder || document.body
        };
    }

    function readDomoticzThemeProbe(probe) {
        const tile = probe.querySelector('#itemtablesmall tbody tr');
        const tileSurface = probe.querySelector('#pypluginstore-theme-card-sample');
        if (tileSurface) {
            tileSurface.classList.add('statusNormal');
        }

        const tileRow = probe.querySelector('#dashcontent .row, .bannercontent .row, .row');
        const tileName = probe.querySelector('#itemtablesmall td#name, #itemtablesmall tr td:first-child');
        if (!tile || !tileName) return null;

        const tileValue = probe.querySelector('#itemtablesmall td#bigtext, #itemtablesmall tr td:first-child + td');
        const tileStatus = probe.querySelector('#itemtablesmall td#status, #itemtablesmall tr td:first-child + td + td + td');
        const button = probe.querySelector('.btnstyle3, .btnsmall, .btn.btn-default, .btn');
