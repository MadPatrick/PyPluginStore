    function readSafeTitleHeight(style) {
        const height = parseCssPixelLength(style && style.height);
        if (!Number.isFinite(height) || height <= 0) return '24px';
        return formatCssPixelLength(Math.max(24, height));
    }

    function readSafeTitleLineHeight(style) {
        const lineHeight = style ? style.lineHeight : '';
        const lineHeightPixels = parseCssPixelLength(lineHeight);
        if (!Number.isFinite(lineHeightPixels) || lineHeightPixels <= 0) {
            return firstUsefulThemeValue(lineHeight, 'normal');
        }
        return formatCssPixelLength(Math.max(18, lineHeightPixels));
    }

    function parseCssLengthBox(value) {
        if (typeof value !== 'string') return null;
        const parts = value.trim().split(/\s+/).filter(Boolean);
        if (parts.length !== 4) return null;
        const numbers = parts.map(parseCssPixelLength);
        return numbers.every(Number.isFinite) ? numbers : null;
    }

    function parseCssPixelLength(value) {
        if (typeof value !== 'string') return NaN;
        const clean = value.trim();
        if (clean === '' || clean === 'auto' || clean === 'normal') return NaN;
        const match = clean.match(/^(-?\d+(?:\.\d+)?)px$/i);
        return match ? parseFloat(match[1]) : NaN;
    }

    function formatCssPixelLength(value) {
        const rounded = Math.round(value * 100) / 100;
        return (Math.abs(rounded - Math.round(rounded)) < 0.001 ? Math.round(rounded) : rounded) + 'px';
    }

    function readRadius(style) {
        if (!style) return '';
        const topLeft = style.borderTopLeftRadius;
        const topRight = style.borderTopRightRadius;
        const bottomRight = style.borderBottomRightRadius;
        const bottomLeft = style.borderBottomLeftRadius;
        if (!topLeft || !topRight || !bottomRight || !bottomLeft) return '';
        if (topLeft === topRight && topLeft === bottomRight && topLeft === bottomLeft) {
            return topLeft;
        }
        return topLeft + ' ' + topRight + ' ' + bottomRight + ' ' + bottomLeft;
    }

    async function init() {
        setLayoutMode(readStoredLayoutMode(), false);
        setupThemeObserver();

        if (document.getElementById('pypluginstore-status').innerText !== 'Initializing...') {
            return;
        }

        const installedToggle = document.getElementById('installed-toggle');
        const layoutToggle = document.getElementById('layout-toggle');
        installedToggle.checked = readStoredInstalledFilter();
        document.getElementById('search-box').oninput = filterAndRender;
        installedToggle.onchange = function() {
            writeStoredInstalledFilter(installedToggle.checked);
            filterAndRender();
        };
        if (layoutToggle) {
            layoutToggle.onchange = function() {
                setLayoutMode(layoutToggle.checked ? LAYOUT_THEME : LAYOUT_PYPLUGIN, true);
            };
        }
        setupLocalRegistryDialog();
        document.getElementById('manage-local-registry').onclick = openLocalRegistry;
        document.getElementById('refresh-update-status').onclick = refreshUpdateStatus;
        document.getElementById('restart-domoticz').onclick = restartDomoticz;
        document.getElementById('sort-select').onchange = function() {
            currentSort = this.value;
            filterAndRender();
        };

        setStatus("Finding API bridge...");
        try {
            await findApiBridgeDevices();

            if (!payloadIdx || !triggerIdx) {
                setStatus("Error: PyPluginStore devices not found (" + (payloadIdx ? 'Y' : 'N') + "/" + (triggerIdx ? 'Y' : 'N') + "). Please ensure the plugin is added in Hardware.");
                return;
            }

            console.log("Found bridge devices: Payload=" + payloadIdx + ", Trigger=" + triggerIdx);
            loadPlugins();
        } catch (e) {
            console.error("Init Error:", e);
            setStatus("Failed to connect to Domoticz API: " + e.message);
        }
    }

    function scanApiBridgeDevices(devices) {
        if (!devices) return;

        for (const device of devices) {
            if (device.ID === 'PPM_API_PAYLOAD') {
                payloadIdx = device.idx;
            }
            if (device.ID === 'PPM_API_TRIGGER') {
                triggerIdx = device.idx;
            }
        }
    }

    async function fetchApiBridgeDevices(query) {
        const url = 'json.htm?type=command&param=getdevices&' + query + '&t=' + Date.now();
        console.log("Fetching bridge devices from " + url);
        const req = await fetch(url);
        if (!req.ok) throw new Error("HTTP error " + req.status);
        const devices = await req.json();
        scanApiBridgeDevices(devices.result);
    }

    async function findApiBridgeDevices() {
        const lookups = [
            'filter=all&used=all&displayhidden=1',
            'used=true&displayhidden=1',
            'filter=all&used=all',
        ];

        for (const query of lookups) {
            await fetchApiBridgeDevices(query);
            if (payloadIdx && triggerIdx) return;
        }
    }

    async function sendCommand(action, data, options = {}) {
        if (isLoading) {
            alert("An operation is already in progress. Please wait.");
            return null;
        }
        isLoading = true;

        try {
            await clearApiBridgePayload();
            const txId = Date.now().toString();
            const payload = JSON.stringify({ action, tx_id: txId, ...data });

            console.log("Sending command: " + action, payload);
            await fetch(`json.htm?type=command&param=udevice&idx=${payloadIdx}&nvalue=0&svalue=${encodeURIComponent(payload)}`);
            await fetch(`json.htm?type=command&param=switchlight&idx=${triggerIdx}&switchcmd=On`);

            return await pollResponse(action, txId, options.retries || 120);
        } finally {
            isLoading = false;
        }
    }

    async function clearApiBridgePayload() {
        if (!payloadIdx) return;

        try {
            await fetch(`json.htm?type=command&param=udevice&idx=${payloadIdx}&nvalue=0&svalue=`);
        } catch (e) {
            console.warn("Could not clear API bridge payload", e);
        }
    }

    async function pollResponse(action, txId, retries = 120) {
        console.log("Polling for response to " + action + " (tx_id: " + txId + ")...");
        for (let i = 0; i < retries; i++) {
            await new Promise(r => setTimeout(r, 1000));
            try {
                const req = await fetch(`json.htm?type=command&param=getdevices&rid=${payloadIdx}&t=` + Date.now());
                const resp = await req.json();

                if (resp.result && resp.result.length > 0) {
                    const dataStr = resp.result[0].Data;
                    try {
                        const data = JSON.parse(dataStr);
                        const isExpectedActionResponse = data.action === action && data.tx_id === txId;
                        const isExpectedErrorResponse = data.status === 'error' && !data.action && data.tx_id === txId;
                        if (isExpectedActionResponse || isExpectedErrorResponse) {
                            console.log("Received response:", data);
                            await clearApiBridgePayload();
                            return data;
                        }
                    } catch (e) {}
                }
            } catch (e) {
                console.error("Polling error", e);
            }
        }
        throw new Error("Timeout waiting for plugin response.");
    }

    async function loadPlugins() {
        setStatus("Loading plugins from registry...");
        try {
            const response = await sendCommand('list_plugins', {});
            if (response && response.status === 'success') {
                pluginCache = response.data;
                installedCache = response.installed;
                localCache = response.local_plugins || [];
                updateStatusCache = response.update_status || {};
                versionsCache = response.versions || {};
                managementCache = response.management || {};
                platformCache = response.platforms || {};
                installedMatchDetailsCache = response.installed_match_details || {};
                managerKey = response.manager_key || null;
                selfUpdateState = response.self_update || null;
                filterAndRender();
                setStatus(`Loaded ${Object.keys(response.data).length} plugins.`);
            } else {
                setStatus("Error loading plugins: " + (response ? response.message : "Unknown error"));
            }
        } catch (e) {
            setStatus(e.message);
        }
    }

    function setupLocalRegistryDialog() {
        const dialog = document.getElementById('local-registry-dialog');
        if (!dialog || dialog.dataset.initialized === 'true') return;
        dialog.dataset.initialized = 'true';

        document.getElementById('local-registry-close').onclick = requestCloseLocalRegistry;
        document.getElementById('local-registry-add').onclick = function() {
            showLocalRegistryForm(null);
        };
        document.getElementById('local-registry-cancel').onclick = function() {
            if (!localRegistryFormDirty || confirm('Discard your unsaved local registry changes?')) {
                showLocalRegistryList();
            }
        };
        document.getElementById('local-registry-reload').onclick = loadLocalRegistry;
        document.getElementById('local-registry-public-seed').onchange = function() {
            prefillLocalRegistryFromPublic(this.value);
        };

        const form = document.getElementById('local-registry-form');
        form.addEventListener('input', function() {
            localRegistryFormDirty = true;
        });
        form.addEventListener('submit', function(event) {
            event.preventDefault();
            saveLocalRegistryEntry();
        });
        dialog.addEventListener('cancel', function(event) {
            event.preventDefault();
            requestCloseLocalRegistry();
        });
        dialog.addEventListener('close', function() {
            localRegistryPendingDeleteKey = '';
        });
    }

    async function openLocalRegistry() {
        const dialog = document.getElementById('local-registry-dialog');
        showLocalRegistryList();
        setLocalRegistryAlert('');
        document.getElementById('local-registry-path').textContent = 'Loading registry_local.json...';
        if (!dialog.open) dialog.showModal();
        await loadLocalRegistry();
    }

    function requestCloseLocalRegistry() {
        if (localRegistryFormDirty && !confirm('Discard your unsaved local registry changes?')) {
            return;
        }
        localRegistryFormDirty = false;
        document.getElementById('local-registry-dialog').close();
    }

    function setLocalRegistryAlert(message, showReload = false) {
        const alertRegion = document.getElementById('local-registry-alert');
        const reloadButton = document.getElementById('local-registry-reload');
        alertRegion.textContent = message || '';
        alertRegion.hidden = !message;
        reloadButton.hidden = !showReload;
    }

    async function loadLocalRegistry() {
        try {
            const response = await sendCommand('get_local_registry', {});
            if (!response) return;

            localRegistryRevision = response.revision || '';
            localRegistryPath = response.path || '';
            localRegistryReadOnly = response.status !== 'success' || Boolean(response.read_only);
            localRegistryEntries = response.status === 'success' ? (response.entries || []) : [];
            document.getElementById('local-registry-path').textContent = localRegistryPath ? 'File: ' + localRegistryPath : 'registry_local.json';
            if (response.status === 'success') {
                setLocalRegistryAlert('');
            } else {
                setLocalRegistryAlert(response.message || 'Could not read registry_local.json.');
            }
            renderLocalRegistryEntries();
            updateLocalRegistryMutationState();
        } catch (error) {
            localRegistryReadOnly = true;
            setLocalRegistryAlert('Could not load registry_local.json: ' + error.message, true);
            updateLocalRegistryMutationState();
        }
    }

    function updateLocalRegistryMutationState() {
        document.getElementById('local-registry-add').disabled = localRegistryReadOnly;
        document.getElementById('local-registry-save').disabled = localRegistryReadOnly;
    }

    function renderLocalRegistryEntries() {
        const container = document.getElementById('local-registry-entries');
        const empty = document.getElementById('local-registry-empty');
        container.replaceChildren();
        empty.hidden = localRegistryEntries.length > 0;

        for (const entry of localRegistryEntries) {
            const item = document.createElement('article');
            item.className = 'local-registry-entry';

            const header = document.createElement('div');
            header.className = 'local-registry-entry-header';
            const title = document.createElement('span');
            title.className = 'local-registry-entry-title';
            title.textContent = entry.key;
            header.appendChild(title);

            const badges = document.createElement('span');
            if (entry.installed) {
                const installed = document.createElement('span');
                installed.className = 'installed-badge';
                installed.textContent = 'Installed';
                badges.appendChild(installed);
            }
            if (entry.overrides_public) {
                const override = document.createElement('span');
                override.className = 'local-badge';
                override.textContent = 'Public override';
                badges.appendChild(override);
            }
            header.appendChild(badges);
            item.appendChild(header);

            const source = document.createElement('div');
            source.className = 'local-registry-entry-meta';
            source.textContent = entry.repository_source || 'Repository source needs repair';
            item.appendChild(source);

            const branch = document.createElement('div');
            branch.className = 'local-registry-entry-meta';
            branch.textContent = 'Branch: ' + (entry.branch || 'master');
            item.appendChild(branch);

            if (!entry.valid) {
                const error = document.createElement('div');
                error.className = 'local-registry-alert';
                error.textContent = Object.values(entry.errors || {}).join(' ') || 'This entry needs repair.';
                item.appendChild(error);
            }

            if (localRegistryPendingDeleteKey === entry.key) {
                item.appendChild(renderLocalRegistryDeleteConfirmation(entry));
            } else {
                const actions = document.createElement('div');
                actions.className = 'local-registry-entry-actions';
                const editButton = document.createElement('button');
                editButton.type = 'button';
                editButton.textContent = 'Edit';
                editButton.disabled = localRegistryReadOnly;
                editButton.onclick = function() {
                    showLocalRegistryForm(entry);
                };
                const deleteButton = document.createElement('button');
                deleteButton.type = 'button';
                deleteButton.className = 'local-registry-danger';
                deleteButton.textContent = 'Delete';
                deleteButton.disabled = localRegistryReadOnly;
                deleteButton.onclick = function() {
                    localRegistryPendingDeleteKey = entry.key;
                    renderLocalRegistryEntries();
                };
                actions.appendChild(editButton);
                actions.appendChild(deleteButton);
                item.appendChild(actions);
            }

            container.appendChild(item);
        }
    }

    function renderLocalRegistryDeleteConfirmation(entry) {
        const confirmation = document.createElement('div');
        confirmation.className = 'local-registry-delete-confirm';
        confirmation.setAttribute('role', 'alert');
        const message = document.createElement('p');
        let detail = 'Delete the local override for ' + entry.key + '?';
        if (entry.installed) {
            detail += ' The installed plugin will remain on disk. It may become Repo mismatch when the public registry entry becomes active.';
        }
        message.textContent = detail;
        confirmation.appendChild(message);

        const actions = document.createElement('div');
        actions.className = 'local-registry-actions';
        const cancelButton = document.createElement('button');
        cancelButton.type = 'button';
        cancelButton.textContent = 'Cancel';
        cancelButton.onclick = function() {
            localRegistryPendingDeleteKey = '';
            renderLocalRegistryEntries();
        };
        const deleteButton = document.createElement('button');
        deleteButton.type = 'button';
        deleteButton.className = 'local-registry-danger';
        deleteButton.textContent = 'Delete override';
        deleteButton.onclick = function() {
            deleteLocalRegistryEntry(entry.key);
        };
        actions.appendChild(cancelButton);
        actions.appendChild(deleteButton);
        confirmation.appendChild(actions);
        return confirmation;
    }

    function showLocalRegistryList() {
        document.getElementById('local-registry-list-view').hidden = false;
        document.getElementById('local-registry-form-view').hidden = true;
        localRegistryOriginalKey = '';
        localRegistryFormDirty = false;
        localRegistryPendingDeleteKey = '';
        clearLocalRegistryFieldErrors();
        renderLocalRegistryEntries();
    }

    function showLocalRegistryForm(entry) {
        localRegistryOriginalKey = entry ? entry.key : '';
        document.getElementById('local-registry-list-view').hidden = true;
        document.getElementById('local-registry-form-view').hidden = false;
        document.getElementById('local-registry-form-title').textContent = entry ? 'Edit local entry' : 'Add local entry';
        document.getElementById('local-registry-public-seed-field').hidden = Boolean(entry);
        populateLocalRegistryPublicSeeds();

        const localRegistryKey = document.getElementById('local-registry-key');
        localRegistryKey.value = entry ? entry.key : '';
        localRegistryKey.readOnly = Boolean(localRegistryOriginalKey);
        document.getElementById('local-registry-source').value = entry ? entry.repository_source : '';
        document.getElementById('local-registry-description').value = entry ? entry.description : '';
        document.getElementById('local-registry-branch').value = entry ? (entry.branch || 'master') : 'master';
        document.getElementById('local-registry-public-seed').value = '';
        clearLocalRegistryFieldErrors();
        setLocalRegistryAlert('');
        localRegistryFormDirty = false;
        localRegistryKey.focus();
    }

    function populateLocalRegistryPublicSeeds() {
        const select = document.getElementById('local-registry-public-seed');
        const blank = document.createElement('option');
        blank.value = '';
        blank.textContent = 'Blank entry';
        select.replaceChildren(blank);
        const localKeys = new Set(localRegistryEntries.map(entry => entry.key));
        for (const key of Object.keys(pluginCache || {}).sort((a, b) => a.localeCompare(b))) {
            if (localKeys.has(key) || key === managerKey) continue;
            const option = document.createElement('option');
            option.value = key;
            option.textContent = formatPluginDisplayName(key);
            select.appendChild(option);
        }
    }

    function prefillLocalRegistryFromPublic(pluginKey) {
        if (!pluginKey || !pluginCache || !pluginCache[pluginKey]) return;
        const info = pluginCache[pluginKey];
        const author = String(info[0] || '');
        const repository = String(info[1] || '');
        const branch = String(info[3] || 'master');
        document.getElementById('local-registry-key').value = pluginKey;
        document.getElementById('local-registry-source').value = repository ? buildRepoUrl(author, repository, branch) : author;
        document.getElementById('local-registry-description').value = String(info[2] || '');
        document.getElementById('local-registry-branch').value = branch;
        localRegistryFormDirty = true;
        clearLocalRegistryFieldErrors();
    }

    function clearLocalRegistryFieldErrors() {
        const fields = ['key', 'source', 'description', 'branch'];
        for (const field of fields) {
            const input = document.getElementById('local-registry-' + field);
            const error = document.getElementById('local-registry-' + field + '-error');
            if (input) input.setAttribute('aria-invalid', 'false');
            if (error) error.textContent = '';
        }
    }

    function showLocalRegistryFieldErrors(fieldErrors) {
        clearLocalRegistryFieldErrors();
        const fieldIds = {
            key: 'key',
            repository_source: 'source',
            description: 'description',
            branch: 'branch'
        };
        for (const [field, message] of Object.entries(fieldErrors || {})) {
            const fieldId = fieldIds[field];
            if (!fieldId) continue;
            const input = document.getElementById('local-registry-' + fieldId);
            const error = document.getElementById('local-registry-' + fieldId + '-error');
            input.setAttribute('aria-invalid', 'true');
            error.textContent = message;
        }
    }

    function localRegistryFormEntry() {
        return {
            key: document.getElementById('local-registry-key').value.trim(),
            repository_source: document.getElementById('local-registry-source').value.trim(),
            description: document.getElementById('local-registry-description').value.trim(),
            branch: document.getElementById('local-registry-branch').value.trim() || 'master'
        };
    }

    function localRegistryRequestFitsBridge(entry) {
        const request = {
            action: 'upsert_local_registry_entry',
            tx_id: '0000000000000',
            expected_revision: localRegistryRevision,
            original_key: localRegistryOriginalKey,
            entry
        };
        return JSON.stringify(request).length <= LOCAL_REGISTRY_PAYLOAD_MAX_LENGTH;
    }

    async function saveLocalRegistryEntry() {
        const form = document.getElementById('local-registry-form');
        clearLocalRegistryFieldErrors();
        if (!form.reportValidity()) return;

        const entry = localRegistryFormEntry();
        if (!localRegistryRequestFitsBridge(entry)) {
            setLocalRegistryAlert('This entry is too large for the Domoticz API bridge. Shorten the repository source or description.');
            return;
        }

        try {
            const response = await sendCommand('upsert_local_registry_entry', {
                expected_revision: localRegistryRevision,
                original_key: localRegistryOriginalKey,
                entry
            });
            if (response && response.status === 'success') {
                localRegistryRevision = response.revision || localRegistryRevision;
                localRegistryFormDirty = false;
                await loadLocalRegistry();
                await loadPlugins();
                showLocalRegistryList();
                setStatus('Local registry entry saved.');
                return;
            }

            const fieldErrors = response && response.field_errors ? response.field_errors : {};
            showLocalRegistryFieldErrors(fieldErrors);
            setLocalRegistryAlert(
                response ? response.message : 'Could not save the local registry entry.',
                Boolean(response && response.reload_required)
            );
            if (response && response.read_only) {
                localRegistryReadOnly = true;
                updateLocalRegistryMutationState();
            }
        } catch (error) {
            setLocalRegistryAlert('Could not save the local registry entry: ' + error.message, true);
        }
    }

    async function deleteLocalRegistryEntry(pluginKey) {
        try {
            const response = await sendCommand('delete_local_registry_entry', {
                expected_revision: localRegistryRevision,
                plugin_key: pluginKey
            });
            if (response && response.status === 'success') {
                localRegistryRevision = response.revision || localRegistryRevision;
                localRegistryPendingDeleteKey = '';
                await loadLocalRegistry();
                await loadPlugins();
                showLocalRegistryList();
                setStatus('Local registry override deleted.');
                return;
            }
            setLocalRegistryAlert(
                response ? response.message : 'Could not delete the local registry entry.',
                Boolean(response && response.reload_required)
            );
        } catch (error) {
            setLocalRegistryAlert('Could not delete the local registry entry: ' + error.message, true);
        }
    }

    function filterAndRender() {
        if (!pluginCache) return;

        const searchQuery = document.getElementById('search-box').value.toLowerCase();
        const showInstalledOnly = document.getElementById('installed-toggle').checked;

        const filteredKeys = Object.keys(pluginCache).filter(key => {
            const info = pluginCache[key] || [];
            const description = String(info[2] || '').toLowerCase();
            const displayName = formatPluginDisplayName(key).toLowerCase();
            const matchesSearch = description.includes(searchQuery) ||
                key.toLowerCase().includes(searchQuery) ||
                displayName.includes(searchQuery);
            const isInstalled = installedCache.indexOf(key) !== -1;

            if (showInstalledOnly && !isInstalled) return false;
            return matchesSearch;
        });

        const filteredData = {};
        filteredKeys.forEach(key => filteredData[key] = pluginCache[key]);

        renderPlugins(filteredData, installedCache);
    }

    function sortPlugins(pluginData, sortBy) {
        const keys = Object.keys(pluginData);

        switch(sortBy) {
            case 'name':
                return keys.sort((a, b) => formatPluginDisplayName(a).localeCompare(formatPluginDisplayName(b)));
            case 'name-desc':
                return keys.sort((a, b) => formatPluginDisplayName(b).localeCompare(formatPluginDisplayName(a)));
            case 'updated':
                return keys.sort((a, b) => {
                    const dateA = new Date(pluginData[a][4] || 0);
                    const dateB = new Date(pluginData[b][4] || 0);
                    return dateB - dateA;
                });
            case 'updated-oldest':
                return keys.sort((a, b) => {
                    const dateA = new Date(pluginData[a][4] || 0);
                    const dateB = new Date(pluginData[b][4] || 0);
                    return dateA - dateB;
                });
            default:
                return keys.sort((a, b) => formatPluginDisplayName(a).localeCompare(formatPluginDisplayName(b)));
        }
    }

    function formatPluginDisplayName(pluginName) {
        const displayName = String(pluginName || '')
            .replace(/^domoticz[-_ ]+plugin[-_ ]+/i, '')
            .replace(/^domoticz[-_ ]+for[-_ ]+/i, '')
            .replace(/^domoticz[-_ ]+/i, '')
            .replace(/[-_ ]+domoticz[-_ ]+plugin$/i, '')
            .replace(/[-_ ]+for[-_ ]+domoticz$/i, '')
            .replace(/[-_ ]+domoticz$/i, '')
            .replace(/^[-_ ]+|[-_ ]+$/g, '');
        return displayName || pluginName;
    }

    function stripRepoUrl(url) {
        let stripped = String(url || '').trim().replace(/\/$/, '');
        const markers = [
            '/-/tree/',
            '/-/blob/',
            '/tree/',
            '/blob/',
            '/src/branch/',
            '/raw/branch/'
        ];
        for (const marker of markers) {
            if (stripped.indexOf(marker) !== -1) {
                stripped = stripped.split(marker, 1)[0];
                break;
            }
        }
        return stripped.replace(/\.git$/, '');
    }

    function encodeRepoPath(pathParts) {
        return pathParts.map(part => encodeURIComponent(part)).join('/');
    }

    function encodeBranchPath(branch) {
        return String(branch || '').split('/').filter(Boolean).map(part => encodeURIComponent(part)).join('/');
    }

    function parseRepoReference(author, repo) {
        const cleanAuthor = String(author || '').trim();
        const cleanRepo = String(repo || '').trim().replace(/\.git$/, '');
        const fallbackHost = 'github.com';

        if (cleanAuthor.startsWith('http://') || cleanAuthor.startsWith('https://')) {
            try {
                const strippedUrl = stripRepoUrl(cleanAuthor);
                const parsed = new URL(strippedUrl);
                const pathParts = parsed.pathname
                    .replace(/^\/+|\/+$/g, '')
                    .split('/')
                    .filter(Boolean)
                    .map(part => decodeURIComponent(part.replace(/\.git$/, '')));
                return { host: parsed.hostname.toLowerCase(), pathParts };
            } catch (error) {
                return { host: fallbackHost, pathParts: [cleanAuthor, cleanRepo].filter(Boolean) };
            }
        }

        const sshMatch = cleanAuthor.match(/^(?:[^@:/]+@)?([^:/]+):(.+)$/);
        if (sshMatch) {
            const host = sshMatch[1].toLowerCase();
            const pathParts = sshMatch[2].replace(/\.git$/, '').split('/').filter(Boolean);
            return { host, pathParts };
        }

        const authorParts = cleanAuthor.split('/').filter(Boolean);
        const firstAuthorPart = (authorParts[0] || '').toLowerCase();
        if (firstAuthorPart.indexOf('.') !== -1 && authorParts.length > 1) {
            const pathParts = authorParts.slice(1);
            if (cleanRepo) pathParts.push(cleanRepo);
            return { host: firstAuthorPart, pathParts };
        }

        return { host: fallbackHost, pathParts: [cleanAuthor, cleanRepo].filter(Boolean) };
    }

    function buildRepoUrl(author, repo, branch) {
        const repoReference = parseRepoReference(author, repo);
        if (!repoReference.host || repoReference.pathParts.length === 0) {
            return '';
        }
        const repoUrl = stripRepoUrl('https://' + repoReference.host + '/' + encodeRepoPath(repoReference.pathParts));
        const encodedBranch = encodeBranchPath(branch);
        if (!encodedBranch) {
            return repoUrl;
        }
        if (repoReference.host === 'github.com') {
            return repoUrl + '/tree/' + encodedBranch;
        }
        if (repoReference.host === 'gitlab.com') {
            return repoUrl + '/-/tree/' + encodedBranch;
        }
        if (repoReference.host === 'codeberg.org') {
            return repoUrl + '/src/branch/' + encodedBranch;
        }
        return repoUrl;
    }

    function parseVersionParts(version) {
        const cleanVersion = String(version || '').trim().replace(/^v/i, '');
        if (!cleanVersion) return [];
        return cleanVersion.split(/[.+_-]/).map(part => {
            if (/^\d+$/.test(part)) return { type: 'number', value: Number(part) };
            return { type: 'text', value: part.toLowerCase() };
        });
    }

    function compareVersions(leftVersion, rightVersion) {
        const left = parseVersionParts(leftVersion);
        const right = parseVersionParts(rightVersion);
        const maxLength = Math.max(left.length, right.length);
        for (let index = 0; index < maxLength; index++) {
            const leftPart = left[index] || { type: 'number', value: 0 };
            const rightPart = right[index] || { type: 'number', value: 0 };
            if (leftPart.type === 'number' && rightPart.type === 'number') {
                if (leftPart.value !== rightPart.value) return leftPart.value > rightPart.value ? 1 : -1;
                continue;
            }
            const leftValue = String(leftPart.value);
            const rightValue = String(rightPart.value);
            if (leftValue !== rightValue) return leftValue > rightValue ? 1 : -1;
        }
        return 0;
    }

    function formatVersionStatus(verInfo, updateStatus) {
        const versionParts = [];
        const installedVersion = verInfo && verInfo.installed ? String(verInfo.installed).replace(/^v/i, '') : '';
        const remoteVersion = verInfo && verInfo.available ? String(verInfo.available).replace(/^v/i, '') : '';
        if (installedVersion) versionParts.push('Installed: v' + installedVersion);
        if (remoteVersion && updateStatus === 'available') {
            const comparison = installedVersion ? compareVersions(remoteVersion, installedVersion) : 0;
            const remoteLabel = comparison > 0 ? 'Available' : 'Remote';
            const remoteText = remoteLabel + ': v' + remoteVersion + (comparison < 0 ? ' (installed is newer)' : '');
            versionParts.push(remoteText);
        }
        return versionParts.join(' | ');
    }

    function formatAuthorDisplay(author, repo) {
        const repoReference = parseRepoReference(author, repo);
        if (!repoReference.host || repoReference.pathParts.length === 0) {
            return String(author || '').trim();
        }
        const ownerPath = repoReference.pathParts.length > 1
            ? repoReference.pathParts.slice(0, -1)
            : repoReference.pathParts;
        return repoReference.host + '/' + ownerPath.join('/');
    }

    function selfUpdatePhase(state) {
        return state && state.phase ? String(state.phase) : 'idle';
    }

    function selfUpdateIsActive(state) {
        const phase = selfUpdatePhase(state);
        return phase === 'scheduled' || phase === 'running';
    }

    function selfUpdateBlocksUpdate(state) {
        const phase = selfUpdatePhase(state);
        return selfUpdateIsActive(state) || phase === 'applied_needs_reload';
    }

    function selfUpdateIsVisible(state) {
        const phase = selfUpdatePhase(state);
        return phase !== 'idle' && phase !== 'confirmed';
    }

    function selfUpdatePhaseLabel(state) {
        const phase = selfUpdatePhase(state);
        if (phase === 'scheduled') return 'Update queued';
        if (phase === 'running') return 'Updating';
        if (phase === 'applied_needs_reload') return 'Update applied';
        if (phase === 'preflight_failed') return 'Update refused';
        if (phase === 'failed') return 'Update failed';
        if (phase === 'stale_unknown') return 'Update status unknown';
        return 'Self-update';
    }

    function renderSelfUpdateState(meta) {
        if (!selfUpdateIsVisible(selfUpdateState)) return;

        const phase = selfUpdatePhase(selfUpdateState);
        const message = selfUpdateState.message || selfUpdatePhaseLabel(selfUpdateState);
        const detail = document.createElement('span');
        detail.className = 'self-update-detail self-update-detail-' + phase;
        detail.textContent = 'Self-update: ' + message;
        if (selfUpdateState.log_file && (phase === 'failed' || phase === 'preflight_failed' || phase === 'stale_unknown')) {
            detail.title = 'Details: ' + selfUpdateState.log_file;
        }
        meta.appendChild(document.createElement('br'));
        meta.appendChild(detail);
    }

    function appendSelfUpdateBadge(statusBadges) {
        if (!selfUpdateIsVisible(selfUpdateState)) return;

        const phase = selfUpdatePhase(selfUpdateState);
        const badge = document.createElement('span');
        badge.className = 'self-update-badge self-update-badge-' + phase;
        badge.textContent = selfUpdatePhaseLabel(selfUpdateState);
        if (selfUpdateState.log_file) {
            badge.title = 'Details: ' + selfUpdateState.log_file;
        }
        statusBadges.appendChild(badge);
    }

    function releaseChannelLabel(state) {
        if (!state || state.channel === undefined) return '';
        if (state.channel === 'release') return 'Release';
        if (state.channel === 'git') return 'Git';
        return '';
    }

    function formatReleaseManagementStatus(state) {
        if (!state) return '';
        if (state.channel === 'git' &&
            (state.status === 'git_current' || state.status === 'git_unknown')) {
            return '';
        }
        const channel = state.channel === 'release' ? 'Release' :
            (state.channel === 'git' ? 'Git' : '');
        const version = state.available_version || state.installed_version || '';
        const target = version ? 'v' + String(version).replace(/^v/i, '') : '';
        const details = [];

        if (state.status === 'verification_failed') {
            details.push('Verification failed' + (state.verification_message ? ': ' + state.verification_message : ''));
        } else if (state.status === 'release_metadata_unavailable') {
            details.push('Release metadata unavailable' + (state.verification_message ? ': ' + state.verification_message : ''));
        } else if (String(state.status || '').indexOf('migration_blocked') === 0) {
            details.push('Migration blocked' + (state.migration_message ? ': ' + state.migration_message : ''));
        } else if (state.status === 'migration_confirmation_required') {
            const releaseTarget = target ? ' to ' + target : '';
            details.push('Release switch' + releaseTarget + ' requires confirmation' +
                (state.migration_message ? ': ' + state.migration_message : ''));
        } else if (state.status === 'migration_waiting_for_release') {
            details.push('Migration waiting for release' + (state.migration_message ? ': ' + state.migration_message : ''));
        } else if (state.status === 'git_available') {
            details.push('Update available');
        } else if (state.status === 'rollback_available') {
            const rollbackVersion = state.rollback_version ? 'v' + String(state.rollback_version).replace(/^v/i, '') : '';
            details.push('Rollback available' + (rollbackVersion ? ': ' + rollbackVersion : ''));
        } else if (state.status === 'migration_available') {
            details.push('Release migration available' + (target ? ': ' + target : ''));
        } else if (state.status === 'available') {
            details.push((target ? target + ' — ' : '') + 'available');
        } else if (state.status === 'current') {
            details.push((target ? target + ' — ' : '') + 'current');
        } else if (state.status) {
            details.push(String(state.status).replace(/_/g, ' '));
        }

        if (state.restart_pending) details.push('Restart required');
        return [channel, ...details].filter(Boolean).join(' · ');
    }

    function releaseManagementActions(state, context) {
        const actions = [];
        const installed = Boolean(context && context.installed);
        if (!installed) return actions;
        // The manager intentionally stays on its guarded Git-only update path.
        if (context && context.isManager) {
            if (context.isGit) actions.push('update');
            return actions;
        }
        if (!state) {
            if (context && context.isGit) actions.push('update');
            return actions;
        }
        if (state.restart_pending) {
            if (state.rollback_available) actions.push('rollback');
            return actions;
        }
        const releaseSwitchAvailable = state.channel === 'git' &&
            ['available', 'confirmation_required'].includes(state.migration_action_state);
        const migrationIsActiveRoute = state.channel === 'git' &&
            String(state.status || '').startsWith('migration_');
        if (state.updateable && !migrationIsActiveRoute) actions.push('update');
        if (state.channel === 'release') {
            if (state.rollback_available) actions.push('rollback');
            if (state.git_supported) actions.push('use_git');
        } else if (releaseSwitchAvailable) {
            actions.push('use_release');
        }
        return actions;
    }

    function buildReleaseConfirmationPayload(action, pluginKey, token) {
        if (!['update', 'use_git', 'use_release', 'rollback'].includes(action)) {
            throw new Error('Unsupported release management action.');
        }
        if (typeof pluginKey !== 'string' || !pluginKey || pluginKey.length > 128) {
            throw new Error('Invalid plugin key.');
        }
        if (typeof token !== 'string' || !token || token.length > 512) {
            throw new Error('Invalid confirmation token.');
        }
        return { plugin_key: pluginKey, confirmation_token: token };
    }

    async function handleReleaseManagementAction(action, pluginKey) {
        let response = await sendCommand(action, { plugin_key: pluginKey });
        if (response && response.status === 'confirmation_required' && response.challenge) {
            if (!response.challenge.message || !response.challenge.token) {
                throw new Error('The confirmation challenge is incomplete.');
            }
            if (!confirm(response.challenge.message)) return response;
            response = await sendCommand(
                action,
                buildReleaseConfirmationPayload(action, pluginKey, response.challenge.token)
            );
        }
        return response;
    }

    function renderPlugins(pluginData, installedList) {
        const container = document.getElementById('plugins-list');
        if (!container) return;
        container.innerHTML = '';

        const keys = sortPlugins(pluginData, currentSort);

        if (keys.length === 0) {
            const empty = document.createElement('div');
            empty.style.gridColumn = '1/-1';
            empty.style.textAlign = 'center';
            empty.style.padding = '40px';
            empty.style.color = 'var(--pps-text-muted)';
            empty.textContent = 'No plugins match your filters.';
            container.appendChild(empty);
            return;
        }

        const now = new Date();

        for (const key of keys) {
            const info = pluginData[key] || [];
            const author = String(info[0] || '');
            const repo = String(info[1] || '');
            const description = String(info[2] || '');
            const branch = String(info[3] || '');
            const updatedAt = info[4];
            const isInstalled = installedList.indexOf(key) !== -1;
            const isLocal = localCache.indexOf(key) !== -1;
            const updateStatus = updateStatusCache[key] || 'unknown';
            const platforms = platformCache[key] || ['unknown'];
            const displayName = formatPluginDisplayName(key);
            const matchDetails = installedMatchDetailsCache[key] || {};
            const isGit = matchDetails.is_git !== false;
            const management = managementCache[key] || null;
            const hasRepoMismatch = Boolean(matchDetails.registry_mismatch || matchDetails.repo_mismatch || matchDetails.branch_mismatch || updateStatus === 'mismatch');
            const isManager = key === managerKey;

            let timeStr = "";
            if (updatedAt) {
                const date = new Date(updatedAt);
                const diffMs = now - date;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

                if (diffDays === 0) timeStr = "today";
                else if (diffDays === 1) timeStr = "yesterday";
                else if (diffDays < 30) timeStr = diffDays + " days ago";
                else if (diffDays < 365) timeStr = Math.floor(diffDays / 30) + " months ago";
                else timeStr = Math.floor(diffDays / 365) + " years ago";
            }

            const card = document.createElement('div');
            card.className = 'pps-card';

            const header = document.createElement('div');
            header.className = 'pps-card-header';

            const headerMain = document.createElement('div');
            headerMain.className = 'pps-card-header-main';

            const pluginTitle = document.createElement('span');
            pluginTitle.className = 'pps-plugin-title';
            pluginTitle.textContent = displayName;
            pluginTitle.title = displayName;
            headerMain.appendChild(pluginTitle);

            const statusBadges = document.createElement('div');
            statusBadges.className = 'pps-card-header-status';

            if (isInstalled) {
                const badge = document.createElement('span');
                badge.className = 'installed-badge';
                badge.textContent = 'Installed';
                headerMain.appendChild(badge);

                if (isGit === false && !(management && management.channel === 'release')) {
                    const nonGitBadge = document.createElement('span');
                    nonGitBadge.className = 'non-git-badge';
                    nonGitBadge.textContent = 'Non-Git';
                    nonGitBadge.title = 'This plugin was not installed using Git/GitHub. Updates through PyPluginStore are not available.';
                    statusBadges.appendChild(nonGitBadge);
                }

                const channelLabel = releaseChannelLabel(management);
                if (channelLabel) {
                    const channelBadge = document.createElement('span');
                    channelBadge.className = 'channel-badge channel-badge-' + management.channel;
                    channelBadge.textContent = channelLabel;
                    statusBadges.appendChild(channelBadge);
                }

                if (hasRepoMismatch) {
                    const mismatchBadge = document.createElement('span');
                    mismatchBadge.className = 'repo-mismatch-badge';
                    mismatchBadge.textContent = 'Repo mismatch';
                    mismatchBadge.title = 'The installed Git checkout does not match the configured registry repo or branch.';
                    statusBadges.appendChild(mismatchBadge);
                }
            }

            header.appendChild(headerMain);

            if (isManager) {
                appendSelfUpdateBadge(statusBadges);
            }

            const knownPlatforms = platforms.filter(platformName => platformName === 'linux' || platformName === 'windows');
            if (knownPlatforms.length > 0 || isLocal) {
                const platformBadges = document.createElement('div');
                platformBadges.className = 'pps-card-header-platforms platform-badges';
                knownPlatforms.forEach(platformName => {
                    const platformBadge = document.createElement('span');
                    platformBadge.className = 'platform-badge platform-badge-' + platformName;
                    platformBadge.textContent = platformName === 'linux' ? 'Linux' : 'Windows';
                    platformBadges.appendChild(platformBadge);
                });
                if (isLocal) {
                    const localBadge = document.createElement('span');
                    localBadge.className = 'local-badge';
                    localBadge.textContent = 'Local';
                    platformBadges.appendChild(localBadge);
                }
                header.appendChild(platformBadges);
            }

            if (statusBadges.childNodes.length > 0) {
                header.appendChild(statusBadges);
            }

            const desc = document.createElement('div');
            desc.className = 'pps-card-desc';
            desc.textContent = description;

            const meta = document.createElement('div');
            meta.className = 'pps-card-meta';
            meta.appendChild(document.createTextNode('Author: ' + formatAuthorDisplay(author, repo)));
            meta.appendChild(document.createElement('br'));
            meta.appendChild(document.createTextNode('Repo: ' + repo + (branch ? ' (' + branch + ')' : '')));

            if (timeStr) {
                meta.appendChild(document.createElement('br'));
                meta.appendChild(document.createTextNode('Last updated: ' + timeStr));
            }

            if (isInstalled && versionsCache && versionsCache[key]) {
                const verInfo = versionsCache[key];
                if (verInfo.installed || verInfo.available) {
                    meta.appendChild(document.createElement('br'));
                    meta.appendChild(document.createTextNode(formatVersionStatus(verInfo, updateStatus)));
                }
            }

            if (isInstalled && management) {
                const managementText = formatReleaseManagementStatus(management);
                if (managementText) {
                    const managementDetail = document.createElement('span');
                    const isManagementError = management.status === 'verification_failed' ||
                        management.status === 'release_metadata_unavailable' ||
                        String(management.status || '').indexOf('migration_blocked') === 0;
                    managementDetail.className = isManagementError ? 'release-error-detail' : 'release-status-detail';
                    managementDetail.textContent = managementText;
                    meta.appendChild(document.createElement('br'));
                    meta.appendChild(managementDetail);
                }
            }

            if (isManager) {
                renderSelfUpdateState(meta);
            }

            if (isInstalled && hasRepoMismatch) {
                const installedRepo = String(matchDetails.installed_repo || 'unknown repo');
                const installedBranch = String(matchDetails.installed_branch || '');
                const mismatchDetail = document.createElement('span');
                mismatchDetail.className = 'repo-mismatch-detail';
                mismatchDetail.textContent = 'Installed checkout: ' + installedRepo + (installedBranch ? ' (' + installedBranch + ')' : '');
                mismatchDetail.title = 'Add a matching registry_local.json entry to manage updates for this repo and branch.';
                meta.appendChild(document.createElement('br'));
                meta.appendChild(mismatchDetail);
            }

            const actions = document.createElement('div');
            actions.className = 'pps-actions';

            const repoLink = document.createElement('a');
            repoLink.className = 'btn-info btn-link';
            repoLink.href = buildRepoUrl(author, repo, branch);
            repoLink.target = '_blank';
            repoLink.rel = 'noopener noreferrer';
            repoLink.textContent = 'Repo';
            actions.appendChild(repoLink);

            if (isInstalled) {
                const managementActions = releaseManagementActions(management, {
                    installed: isInstalled,
                    isGit: isGit,
                    isManager: isManager
                });
                const updateButton = document.createElement('button');
                const releaseUpdateable = management && management.channel === 'release' && management.updateable;
                if (!managementActions.includes('update')) {
                    updateButton.className = 'btn-update btn-update-disabled';
                    updateButton.title = management && management.restart_pending ? 'Restart required before another update' : 'Updates are unavailable';
                    updateButton.disabled = true;
                } else if (isGit === false && !releaseUpdateable) {
                    updateButton.className = 'btn-update btn-update-disabled';
                    updateButton.title = 'Cannot update non-Git plugins';
                    updateButton.disabled = true;
                } else if (hasRepoMismatch) {
                    updateButton.className = 'btn-update btn-update-disabled';
                    updateButton.title = 'Add a matching registry_local.json override before updating this checkout';
                    updateButton.disabled = true;
                } else if (isManager && selfUpdateBlocksUpdate(selfUpdateState)) {
                    updateButton.className = 'btn-update btn-update-disabled';
                    updateButton.title = selfUpdatePhaseLabel(selfUpdateState);
                    updateButton.disabled = true;
                } else {
                    const updateClass = updateStatus === 'available' ? 'btn-update btn-update-available' : 'btn-update btn-update-current';
                    const verInfo = versionsCache && versionsCache[key] ? versionsCache[key] : {};
                    const installedVersion = verInfo.installed || '';
                    const remoteVersion = verInfo.available || '';
                    const installedIsNewer = updateStatus === 'available' && installedVersion && remoteVersion && compareVersions(remoteVersion, installedVersion) < 0;
                    const updateTitle = installedIsNewer ? 'Update resets this plugin to the configured branch' :
                        (updateStatus === 'available' ? 'Update available' :
                        (updateStatus === 'current' ? 'Already up-to-date' : 'Update status unknown'));
                    updateButton.className = updateClass;
                    updateButton.title = updateTitle;
                }
                updateButton.dataset.key = key;
                updateButton.dataset.action = 'update';
                updateButton.type = 'button';
                updateButton.textContent = 'Update';
                actions.appendChild(updateButton);

                if (managementActions.includes('use_git')) {
                    const useGitButton = document.createElement('button');
                    useGitButton.className = 'btn-channel';
                    useGitButton.dataset.key = key;
                    useGitButton.dataset.action = 'use_git';
                    useGitButton.type = 'button';
                    useGitButton.textContent = 'Use Git';
                    actions.appendChild(useGitButton);
                }

                if (managementActions.includes('use_release')) {
                    const useReleaseButton = document.createElement('button');
                    useReleaseButton.className = 'btn-channel';
                    useReleaseButton.dataset.key = key;
                    useReleaseButton.dataset.action = 'use_release';
                    useReleaseButton.type = 'button';
                    useReleaseButton.textContent = 'Switch to Release';
                    actions.appendChild(useReleaseButton);
                }

                if (managementActions.includes('rollback')) {
                    const rollbackButton = document.createElement('button');
                    rollbackButton.className = 'btn-rollback';
                    rollbackButton.dataset.key = key;
                    rollbackButton.dataset.action = 'rollback';
                    rollbackButton.type = 'button';
                    rollbackButton.textContent = 'Rollback';
                    actions.appendChild(rollbackButton);
                }

                if (key !== managerKey) {
                    const removeButton = document.createElement('button');
                    removeButton.className = 'btn-remove';
                    removeButton.dataset.key = key;
                    removeButton.dataset.action = 'remove';
                    removeButton.type = 'button';
                    removeButton.textContent = 'Remove';
                    actions.appendChild(removeButton);
                }
            } else {
                const installButton = document.createElement('button');
                installButton.className = 'btn-install';
                installButton.dataset.key = key;
                installButton.dataset.action = 'install';
                installButton.type = 'button';
                installButton.textContent = 'Install';
                actions.appendChild(installButton);
            }

            card.appendChild(header);
            card.appendChild(desc);
            card.appendChild(meta);
            card.appendChild(actions);
            container.appendChild(card);
        }

        container.querySelectorAll('button[data-action]').forEach(btn => {
            btn.onclick = function() {
                handleAction(this.getAttribute('data-action'), this.getAttribute('data-key'));
            };
        });
    }

    async function handleAction(action, pluginKey) {
        if (action === 'remove' && !confirm(`Are you sure you want to remove ${pluginKey}?`)) {
            return;
        }

        setStatus(`Executing ${action} for ${pluginKey}... This may take a moment.`);
        try {
            const isReleaseManagementAction = ['update', 'use_git', 'use_release', 'rollback'].includes(action);
            const response = isReleaseManagementAction ?
                await handleReleaseManagementAction(action, pluginKey) :
                await sendCommand(action, { plugin_key: pluginKey });
            if (response && response.status === 'success') {
                const successMessage = response.message || `Successfully completed ${action} for ${pluginKey}. Domoticz restart may be required.`;
                alert(successMessage);
                setStatus(successMessage);
                if (response.operation === 'self_update') {
                    selfUpdateState = response.self_update || selfUpdateState;
                    filterAndRender();
                    pollSelfUpdateStatus();
                } else if (!(action === 'update' && pluginKey === managerKey)) {
                    await loadPlugins();
                }
            } else {
                alert(`Error during ${action}: ` + (response ? response.message : "Unknown error"));
                setStatus("Operation failed.");
            }
        } catch (e) {
            alert("Error: " + e.message);
            setStatus("Operation failed.");
        }
    }

    async function pollSelfUpdateStatus(maxAttempts = 30) {
        for (let attempt = 0; attempt < maxAttempts; attempt++) {
            await new Promise(r => setTimeout(r, 2000));
            try {
                const response = await sendCommand('self_update_status', {}, { retries: 10 });
                if (response && response.status === 'success') {
                    selfUpdateState = response.self_update || selfUpdateState;
                    filterAndRender();
                    if (!selfUpdateIsActive(selfUpdateState)) {
                        setStatus(selfUpdateState && selfUpdateState.message ? selfUpdateState.message : "Self-update status refreshed.");
                        return;
                    }
                }
            } catch (e) {
                console.warn("Self-update status polling failed", e);
            }
        }
    }

    async function refreshUpdateStatus() {
        if (!pluginCache) return;

        setStatus("Refreshing update status...");
        try {
            const response = await sendCommand('refresh_update_status', {});
            if (response && response.status === 'success') {
                pluginCache = response.data || pluginCache;
                installedCache = response.installed || installedCache;
                localCache = response.local_plugins || localCache;
                updateStatusCache = response.update_status || {};
                versionsCache = response.versions || versionsCache;
                managementCache = response.management || managementCache;
                platformCache = response.platforms || platformCache;
                installedMatchDetailsCache = response.installed_match_details || installedMatchDetailsCache;
                managerKey = response.manager_key || managerKey;
                selfUpdateState = response.self_update || selfUpdateState;
                filterAndRender();
                setStatus("Update status refreshed.");
            } else {
                alert("Refresh failed: " + (response ? response.message : "Unknown error"));
                setStatus("Refresh failed.");
            }
        } catch (e) {
            alert("Refresh failed: " + e.message);
            setStatus("Refresh failed.");
        }
    }

    async function restartDomoticz() {
        if (!confirm("Restart Domoticz now? The web interface will disconnect while the service restarts.")) {
            return;
        }

        setStatus("Requesting Domoticz restart...");
        try {
            const response = await sendCommand('restart_domoticz', {});
            if (response && response.status === 'success') {
                setStatus("Domoticz restart requested. Reconnect after the service comes back online.");
            } else {
                alert("Restart request failed: " + (response ? response.message : "Unknown error"));
                setStatus("Restart request failed.");
            }
        } catch (e) {
            alert("Restart request failed: " + e.message);
            setStatus("Restart request failed.");
        }
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(init, 100);
    } else {
        document.addEventListener('DOMContentLoaded', init);
    }

    window.addEventListener('load', function() {
        setLayoutMode(readStoredLayoutMode(), false);
        init();
    });
})();
</script>
