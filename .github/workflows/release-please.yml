on:
  push:
    branches:
      - master

permissions:
  contents: read

name: release-please

jobs:
  release-pr:
    if: ${{ !contains(github.event.head_commit.message, 'release-please--branches--master') }}
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          skip-github-release: true

  publish-release:
    if: ${{ contains(github.event.head_commit.message, 'release-please--branches--master') }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          skip-github-pull-request: true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - name: Upload release branding assets
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release.outputs.tag_name }}"

          gh release upload "$tag" \
            pypluginstore.png \
            pypluginstore-icon.png \
            pypluginstore-social-preview.jpg \
            --clobber

          notes_file="$(mktemp)"
          gh release view "$tag" --json body --jq .body > "$notes_file"
          if ! grep -q "pypluginstore-social-preview.jpg" "$notes_file"; then
            cat >> "$notes_file" <<'EOF'

          ### Assets

          Branding assets:

          * `pypluginstore.png` - README/project logo.
          * `pypluginstore-icon.png` - icon artwork.
          * `pypluginstore-social-preview.jpg` - GitHub social preview card.
          EOF
          fi

          gh release edit "$tag" --notes-file "$notes_file"
          gh release edit "$tag" --draft=false
